<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de Correo - CelYa Préstamos</title>
    <link rel="shortcut icon" href="logo-modified.webp?v=3" type="image/webp">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "xhjzz2fw99");
    </script>
    <style>
        :root {
            --bg-page: #18181b;
            --bg-card: #27272a;
            --border-color: #3f3f46;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --accent: #00E6D6;
            --accent-gradient: linear-gradient(135deg, #00E6D6 0%, #00BFFF 100%);
            --success: #27ae60;
            --danger: #e74c3c;
        }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-page);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
            box-sizing: border-box;
        }

        .logo {
            max-width: 120px;
            margin-bottom: 25px;
        }

        .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            background: var(--accent-gradient);
            color: #0b0f19;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            padding: 12px 30px;
            font-size: 15px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 230, 214, 0.2);
            margin-top: 25px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 230, 214, 0.3);
        }

        p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <img class="logo" src="logo-modified.webp?v=5" alt="CelYa Logo">
        
        <div id="status-icon" class="icon">⌛</div>
        <h2 id="status-title">Verificando tu correo...</h2>
        <p id="status-desc">Por favor espera un momento mientras procesamos la validación.</p>
        
        <a id="status-btn" href="https://prestamos.estrenacelya.com/" class="btn" style="display: none;">Solicitar Préstamo</a>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get("token");
            
            const iconEl = document.getElementById("status-icon");
            const titleEl = document.getElementById("status-title");
            const descEl = document.getElementById("status-desc");
            const btnEl = document.getElementById("status-btn");

            if (!token) {
                iconEl.innerText = "❌";
                titleEl.innerText = "Enlace inválido";
                descEl.innerText = "El enlace de verificación no contiene un token válido. Solicita un nuevo correo desde la página de préstamos.";
                btnEl.style.display = "inline-block";
                return;
            }

            try {
                const response = await fetch("https://pb.estrenacelya.com/api/collections/users/confirm-verification", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token: token })
                });

                if (response.ok) {
                    iconEl.innerText = "✅";
                    iconEl.style.color = "var(--success)";
                    titleEl.innerText = "¡Correo Verificado!";
                    descEl.innerText = "Tu dirección de correo electrónico ha sido confirmada con éxito. Ya puedes iniciar sesión y continuar con tus solicitudes.";
                    btnEl.innerText = "Iniciar Sesión";
                } else {
                    iconEl.innerText = "⚠️";
                    iconEl.style.color = "var(--danger)";
                    titleEl.innerText = "Enlace caducado";
                    descEl.innerText = "Este enlace de verificación ya ha sido utilizado o ha caducado. Por favor, solicita uno nuevo en la web.";
                }
            } catch (err) {
                iconEl.innerText = "❌";
                titleEl.style.color = "var(--danger)";
                titleEl.innerText = "Error de conexión";
                descEl.innerText = "No pudimos conectar con el servidor para confirmar tu correo. Por favor reintenta en unos momentos.";
            }
            btnEl.style.display = "inline-block";
        });
    </script>
</body>
</html>
