<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CelYa! - Panel de Control Administrativo</title>
    <script src="config.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #2c3e50; color: #333; }
        .container { max-width: 500px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin: 40px auto; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #34495e; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background: #e67e22; color: white; padding: 14px; border: none; border-radius: 4px; font-size: 16px; margin-top: 25px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button:hover { background: #d35400; }
        .status { text-align: center; font-weight: bold; margin-top: 15px; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚙️ CelYa! Panel Admin<br><span style="font-size: 14px; color: #7f8c8d; font-weight: normal;">Configuración Global de Contratos</span></h2>
    
    <div id="statusMsg" class="status">⏳ Leyendo configuración actual desde Sheets...</div>

    <form id="configForm">
        <label>Porcentaje de Interés Moratorio (%):</label>
        <input type="number" id="interes" name="interes" required>

        <label>Horas de Tolerancia para Pago:</label>
        <input type="number" id="horastol" name="horastol" required>

        <label>Semanas Máximas de Tolerancia (Atraso):</label>
        <input type="number" id="semanastol" name="semanastol" required>

        <button type="submit" id="btnGuardar">💾 Guardar Configuración Global</button>
    </form>
</div>

<script>
    // 1. Cargar las variables actuales del Sheets al abrir la página
    window.onload = async function() {
        try {
            const res = await fetch(CONFIG.GOOGLE_SCRIPT_URL);
            const data = await res.json();
            
            document.getElementById('interes').value = data.config.interes;
            document.getElementById('horastol').value = data.config.horastol;
            document.getElementById('semanastol').value = data.config.semanastol;
            
            document.getElementById('statusMsg').style.display = 'none';
        } catch (err) {
            document.getElementById('statusMsg').innerText = "❌ Error al cargar datos remotos.";
            console.error(err);
        }
    };

    // 2. Guardar los cambios hacia el Sheets sin alertas flotantes
    document.getElementById('configForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnGuardar');
        
        btn.innerText = "⏳ Aplicando cambios en el servidor...";
        btn.style.background = "#34495e";
        btn.disabled = true;

        try {
            const formData = new URLSearchParams();
            formData.append('action', 'updateConfig');
            formData.append('interes', document.getElementById('interes').value);
            formData.append('horastol', document.getElementById('horastol').value);
            formData.append('semanastol', document.getElementById('semanastol').value);

            const res = await fetch(CONFIG.GOOGLE_SCRIPT_URL, {
                method: 'POST',
                body: formData.toString(),
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            });
            const data = await res.json();

            if (data.result === 'success') {
                btn.innerText = "✅ ¡Configuración Guardada!";
                btn.style.background = "#27ae60";
            } else {
                btn.innerText = "⚠️ Error al guardar";
                btn.style.background = "#c0392b";
            }
        } catch (err) {
            btn.innerText = "❌ Error de conexión de red";
            btn.style.background = "#c0392b";
        } finally {
            setTimeout(() => {
                btn.innerText = "💾 Guardar Configuración Global";
                btn.style.background = "#e67e22";
                btn.disabled = false;
            }, 4000);
        }
    });
</script>
</body>
</html>
