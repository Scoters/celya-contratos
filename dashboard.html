<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CelYa! - Panel de Control Administrativo</title>
    <script src="config.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #2c3e50; color: #333; }
        .container { max-width: 550px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin: 20px auto; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        h3 { color: #2c3e50; border-bottom: 2px solid #e67e22; padding-bottom: 5px; margin-top: 25px; font-size: 18px; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #34495e; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 15px; }
        input[readonly] { background-color: #e9ecef; color: #495057; }
        button { width: 100%; background: #e67e22; color: white; padding: 14px; border: none; border-radius: 4px; font-size: 16px; margin-top: 25px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button:hover { background: #d35400; }
        .btn-pago { background: #8e44ad; }
        .btn-pago:hover { background: #71338c; }
        .subtitulo { text-align: center; color: #7f8c8d; font-size: 14px; margin-bottom: 20px; }
        .loading-dash { color: #2980b9; font-weight: bold; text-align: center; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>CelYa! - Dashboard</h2>
    <div class="subtitulo">Consola de Control de Intereses y Cobros Recurrentes</div>
    
    <div id="statusCarga" class="loading-dash">⏳ Leyendo parámetros en la nube de Google Sheets...</div>

    <h3>⚙️ Configuración Global de Créditos</h3>
    <form id="configForm">
        <label>Porcentaje de Interés Moratorio Semanal (%):</label>
        <input type="number" id="interes" required min="0" max="100" step="1">

        <label>Horas de Tolerancia para Pago:</label>
        <input type="number" id="horastol" required min="0" max="168" step="1">

        <label>Semanas de Tolerancia Máxima antes de Bloqueo:</label>
        <input type="number" id="semanastol" required min="0" max="12" step="1">

        <button type="submit" id="btnConfig">💾 Guardar Configuración Global</button>
    </form>

    <h3>💰 Registrar Abono / Pago Semanal</h3>
    <form id="pagoForm" onsubmit="event.preventDefault(); procesarRegistroDePago();">
        <label>Seleccionar Cliente Activo (IMEI):</label>
        <select id="selectorCliente" onchange="calcularCobroAutomatico()" required>
            <option value="">-- Selecciona un cliente del sistema --</option>
        </select>

        <input type="hidden" id="hiddenImei" name="imei">
        <input type="hidden" id="hiddenNombre" name="nombreCliente">

        <label>Monto a Abonar ($):</label>
        <input type="text" id="montoPago" readonly required placeholder="Selecciona un cliente para ver su cuota">

        <label>Método de Pago:</label>
        <select id="metodoPago" required>
            <option value="Efectivo">Efectivo</option>
            <option value="Transferencia">Transferencia Bancaria</option>
            <option value="Depósito">Depósito OXXO / Ventanilla</option>
        </select>

        <label>Semana Correspondiente (Número de Abono):</label>
        <input type="number" id="semanaPago" placeholder="Ej: 3" min="1" max="52" required>

        <label>Número de Recibo / Folio:</label>
        <input type="text" id="folioPago" placeholder="Ej: F-9921" required>

        <label>Notas Adicionales / Comentarios:</label>
        <textarea id="notasPago" placeholder="Opcional..." rows="2"></textarea>

        <button type="submit" id="btnPago" class="btn-pago">💜 Aplicar y Guardar Pago</button>
    </form>
</div>

<script>
    let cacheClientesActivos = [];
    let cacheInventario = [];

    // LÓGICA INTELIGENTE DE DETERMINACIÓN DE CUOTA SEMANAL 🚀
    function calcularCobroAutomatico() {
        const indice = document.getElementById('selectorCliente').value;
        const campoMonto = document.getElementById('montoPago');

        if(indice === "") {
            document.getElementById('hiddenImei').value = "";
            document.getElementById('hiddenNombre').value = "";
            campoMonto.value = "";
            return;
        }

        const datosCliente = cacheClientesActivos[indice];
        document.getElementById('hiddenImei').value = datosCliente.imei;
        document.getElementById('hiddenNombre').value = datosCliente.cliente;

        // Buscamos el equipo en el inventario usando el IMEI del cliente
        const equipo = cacheInventario.find(prod => prod.imei === datosCliente.imei);

        if (equipo) {
            // Mapeo exacto corregido: 26 -> planRapido (Columna D), 52 -> planComodo (Columna E)
            if (datosCliente.plan === "26") {
                campoMonto.value = equipo.planRapido;
            } else {
                campoMonto.value = equipo.planComodo;
            }
            campoMonto.setAttribute('readonly', true);
        } else {
            // Si el equipo ya no está en Inventario (vendido), habilitamos edición manual por contingencia
            campoMonto.removeAttribute('readonly');
            campoMonto.value = "";
            campoMonto.placeholder = "Monto manual (Equipo fuera de Inventario)";
        }
    }

    window.onload = async function() {
        try {
            const respuesta = await fetch(CONFIG.GOOGLE_SCRIPT_URL);
            const dataEcosistema = await respuesta.json();
            
            document.getElementById('interes').value = dataEcosistema.config.interes;
            document.getElementById('horastol').value = dataEcosistema.config.horastol;
            document.getElementById('semanastol').value = dataEcosistema.config.semanastol;
            
            cacheClientesActivos = dataEcosistema.clientesActivos || [];
            cacheInventario = dataEcosistema.inventario || [];
            
            const selectElement = document.getElementById('selectorCliente');
            cacheClientesActivos.forEach((item, index) => {
                const opt = document.createElement('option');
                opt.value = index;
                opt.text = item.etiquetaCompleta;
                selectElement.appendChild(opt);
            });

            document.getElementById('statusCarga').style.display = 'none';
        } catch (error) {
            document.getElementById('statusCarga').innerText = "❌ Error de comunicación con las credenciales de Google.";
            console.error(error);
        }
    };

    // EVENTO GUARDAR CONFIGURACIÓN GLOBAL
    document.getElementById('configForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnConfig');
        const colorOriginal = btn.style.background || "#e67e22";
        
        btn.innerText = "⏳ Aplicando cambios globales...";
        btn.style.background = "#34495e";
        btn.disabled = true;

        try {
            const formData = new URLSearchParams();
            formData.append('action', 'updateConfig');
            formData.append('interes', document.getElementById('interes').value);
            formData.append('horastol', document.getElementById('horastol').value);
            formData.append('semanastol', document.getElementById('semanastol').value);

            const res = await fetch(CONFIG.GOOGLE_SCRIPT_URL, {
                method: 'POST',
                body: formData.toString(),
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            });
            const data = await res.json();

            if (data.result === 'success') {
                btn.innerText = "✅ ¡Configuración Guardada!";
                btn.style.background = "#27ae60";
            } else {
                btn.innerText = "⚠️ Error al guardar";
                btn.style.background = "#c0392b";
            }
        } catch (err) {
            btn.innerText = "❌ Error de red";
            btn.style.background = "#c0392b";
        } finally {
            setTimeout(() => {
                btn.innerText = "💾 Guardar Configuración Global";
                btn.style.background = colorOriginal;
                btn.disabled = false;
            }, 3500);
        }
    });

    // EVENTO PARA REGISTRAR PAGO
    async function procesarRegistroDePago() {
        const btn = document.getElementById('btnPago');
        const colorOriginal = btn.style.background || "#8e44ad";

        btn.innerText = "⏳ Archivando Abono en Base de Datos...";
        btn.style.background = "#34495e";
        btn.disabled = true;

        try {
            const params = new URLSearchParams();
            params.append('action', 'registrarPago');
            params.append('imei', document.getElementById('hiddenImei').value);
            params.append('nombreCliente', document.getElementById('hiddenNombre').value);
            params.append('monto', document.getElementById('montoPago').value);
            params.append('metodo', document.getElementById('metodoPago').value);
            params.append('semana', document.getElementById('semanaPago').value);
            params.append('folio', document.getElementById('folioPago').value);
            params.append('notas', document.getElementById('notasPago').value);

            const respuesta = await fetch(CONFIG.GOOGLE_SCRIPT_URL, {
                method: 'POST',
                body: params.toString(),
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            });
            const resultado = await respuesta.json();

            if (resultado.result === "success") {
                btn.innerText = "✅ ¡Pago Registrado Exitosamente!";
                btn.style.background = "#27ae60";
                document.getElementById('pagoForm').reset();
                setTimeout(() => {
                    location.reload();
                }, 3000);
            } else {
                btn.innerText = "⚠️ Error: " + resultado.error;
                btn.style.background = "#c0392b";
                btn.disabled = false;
            }
        } catch (err) {
            btn.innerText = "❌ Error de conexión de red";
            btn.style.background = "#c0392b";
            btn.disabled = false;
            setTimeout(() => {
                btn.innerText = "💜 Aplicar y Guardar Pago";
                btn.style.background = colorOriginal;
            }, 3500);
        }
    }
</script>
</body>
</html>
