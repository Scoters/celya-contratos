<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Contrato - CelYa</title>
    <script src="config.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 500px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); margin: 0 auto; }
        h2 { text-align: center; color: #2c3e50; }
        label { font-weight: bold; display: block; margin-top: 10px; }
        input, textarea { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        input[readonly] { background-color: #e9ecef; }
        #canvas-firma { border: 2px dashed #34495e; background: #fff; border-radius: 4px; margin-top: 5px; cursor: crosshair; user-select: none; touch-action: none; }
        button { width: 100%; background: #27ae60; color: white; padding: 12px; border: none; border-radius: 4px; font-size: 16px; margin-top: 15px; cursor: pointer; }
        button:hover { background: #219150; }
        .btn-clear { background: #e74c3c; margin-top: 5px; padding: 5px; font-size: 12px; }
        .btn-clear:hover { background: #c0392b; }
        .photo-container { margin: 15px 0; }
        .preview { max-width: 100%; margin-top: 8px; border: 2px solid #ddd; border-radius: 6px; }
    </style>
</head>
<body>

<div class="container">
    <h2>CelYa - Nuevo Contrato</h2>
    <form id="contratoForm">
        <label>IMEI del Equipo:</label>
        <input type="text" id="imei" name="imei" readonly>

        <label>Modelo / Marca:</label>
        <input type="text" id="modelo" name="modelo" readonly>

        <label>Monto del Enganche ($):</label>
        <input type="text" id="monto" name="monto" readonly>

        <label>Cuota Semanal ($):</label>
        <input type="text" id="cuota" name="cuota" readonly>

        <hr style="margin-top:20px;">

        <label>Nombre Completo del Cliente:</label>
        <input type="text" id="cliente" name="cliente" required>

        <label>Teléfono Celular Principal:</label>
        <input type="tel" id="telefono" name="telefono" maxlength="10" required>

        <label>Fecha de Nacimiento:</label>
        <input type="date" id="fechaNacimiento" name="fechaNacimiento" required>

        <label>Dirección Completa de Domicilio:</label>
        <textarea id="direccion" name="direccion" rows="3" required></textarea>

        <label>Teléfono de Aval / Referencia:</label>
        <input type="tel" id="telefonoAval" name="telefonoAval" maxlength="10">

        <div class="photo-container">
            <label>📷 Foto INE Delantera:</label>
            <input type="file" id="ineDelantera" accept="image/*" capture="camera" required>
            <div id="previewDelantera"></div>
        </div>

        <div class="photo-container">
            <label>📷 Foto INE Trasera:</label>
            <input type="file" id="ineTrasera" accept="image/*" capture="camera" required>
            <div id="previewTrasera"></div>
        </div>

        <label>Firma del Cliente:</label>
        <canvas id="canvas-firma" width="460" height="200"></canvas>
        <button type="button" class="btn-clear" onclick="limpiarFirma()">Borrar Firma</button>

        <input type="hidden" id="firmaBase64" name="firmaBase64">
        <input type="hidden" id="ineDelanteraBase64" name="ineDelanteraBase64">
        <input type="hidden" id="ineTraseraBase64" name="ineTraseraBase64">
        
        <input type="hidden" id="interes" name="interes">
        <input type="hidden" id="horastol" name="horastol">
        <input type="hidden" id="semanastol" name="semanastol">
        <input type="hidden" id="plazoSemanas" name="plazoSemanas">
        <input type="hidden" id="totalFinanciado" name="totalFinanciado">
        <input type="hidden" id="totalLetra" name="totalLetra">

        <button type="submit" id="btnEnviar">Generar Contrato y Archivar</button>
    </form>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    document.getElementById('imei').value = urlParams.get('imei') || '';
    document.getElementById('modelo').value = urlParams.get('modelo') || '';
    document.getElementById('monto').value = urlParams.get('monto') || '';
    document.getElementById('cuota').value = urlParams.get('cuota') || '';
    
    document.getElementById('interes').value = urlParams.get('interes') || '';
    document.getElementById('horastol').value = urlParams.get('horastol') || '';
    document.getElementById('semanastol').value = urlParams.get('semanastol') || '';
    document.getElementById('plazoSemanas').value = urlParams.get('plazoSemanas') || '';
    document.getElementById('totalFinanciado').value = urlParams.get('totalFinanciado') || '';
    document.getElementById('totalLetra').value = urlParams.get('totalLetra') || '';

    // Lógica básica Canvas Firma
    const canvas = document.getElementById('canvas-firma'); const ctx = canvas.getContext('2d'); let dibujando = false;
    function obtenerPosicion(e) { const rect = canvas.getBoundingClientRect(); const clientX = e.touches ? e.touches[0].clientX : e.clientX; const clientY = e.touches ? e.touches[0].clientY : e.clientY; return { x: clientX - rect.left, y: clientY - rect.top }; }
    function iniciarDibujo(e) { dibujando = true; pautarDibujo(e); } function terminarDibujo() { dibujando = false; ctx.beginPath(); }
    function pautarDibujo(e) { if (!dibujando) return; e.preventDefault(); const pos = obtenerPosicion(e); ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#000000'; ctx.lineTo(pos.x, pos.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); }
    canvas.addEventListener('mousedown', iniciarDibujo); canvas.addEventListener('mousemove', pautarDibujo); canvas.addEventListener('mouseup', terminarDibujo);
    canvas.addEventListener('touchstart', iniciarDibujo); canvas.addEventListener('touchmove', pautarDibujo); canvas.addEventListener('touchend', terminarDibujo);
    function limpiarFirma() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    let ineDelanteraB64 = ""; let ineTraseraB64 = "";
    function procesarYComprimirImagen(input, previewId, tipo) {
        const preview = document.getElementById(previewId); preview.innerHTML = '';
        if (input.files && input.files[0]) {
            const file = input.files[0]; const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image(); img.src = e.target.result;
                img.onload = function() {
                    const maxAncho = 2048; let ancho = img.width; let alto = img.height;
                    if (ancho > maxAncho) { alto = Math.round((alto * maxAncho) / ancho); ancho = maxAncho; }
                    const canvasOculto = document.createElement('canvas'); canvasOculto.width = ancho; canvasOculto.height = alto;
                    const ctxOculto = canvasOculto.getContext('2d'); ctxOculto.drawImage(img, 0, 0, ancho, alto);
                    const altaCalidadDataURL = canvasOculto.toDataURL('image/jpeg', 0.95);
                    const imgPreview = document.createElement('img'); imgPreview.src = altaCalidadDataURL; imgPreview.className = 'preview'; preview.appendChild(imgPreview);
                    if (tipo === 'delantera') ineDelanteraB64 = altaCalidadDataURL; if (tipo === 'trasera') ineTraseraB64 = altaCalidadDataURL;
                };
            }; reader.readAsDataURL(file);
        }
    }
    document.getElementById('ineDelantera').addEventListener('change', function() { procesarYComprimirImagen(this, 'previewDelantera', 'delantera'); });
    document.getElementById('ineTrasera').addEventListener('change', function() { procesarYComprimirImagen(this, 'previewTrasera', 'trasera'); });

    document.getElementById('contratoForm').addEventListener('submit', async function(e) {
        e.preventDefault(); const btn = document.getElementById('btnEnviar'); btn.innerText = "Procesando..."; btn.disabled = true;
        try {
            document.getElementById('firmaBase64').value = canvas.toDataURL('image/png');
            document.getElementById('ineDelanteraBase64').value = ineDelanteraB64; document.getElementById('ineTraseraBase64').value = ineTraseraB64;
            const sheetData = new URLSearchParams(new FormData(this));
            const res = await fetch(CONFIG.GOOGLE_SCRIPT_URL, { method: 'POST', body: sheetData.toString(), headers: { 'Content-Type': 'application/x-www-form-urlencoded' } });
            const data = await res.json();
            if (data.result === 'success') {
                alert('✅ ¡Éxito total! Contrato registrado.'); document.getElementById('contratoForm').reset(); limpiarFirma();
                document.getElementById('previewDelantera').innerHTML = ''; document.getElementById('previewTrasera').innerHTML = '';
            } else { alert('⚠️ Error: ' + data.error); }
        } catch (err) { alert('❌ Error de conexión.'); } finally { btn.innerText = "Generar Contrato"; btn.disabled = false; }
    });
</script>
</body>
</html>
