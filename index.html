<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Contrato - CelYa</title>
    <script src="config.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
        }

        .container {
            max-width: 500px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin: 0 auto;
        }

        h2 {
            text-align: center;
            color: #2c3e50;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        input[readonly] {
            background-color: #e9ecef;
        }

        .contenedor-canvas-firma {
            width: 100%;
            margin-top: 5px;
            position: relative;
            background: #fff;
            border: 2px dashed #95a5a6;
            border-radius: 6px;
            box-sizing: border-box;
        }

        /* El canvas ocupa el 100% del contenedor por CSS, pero su tamaño nativo se escala por JavaScript */
        canvas {
            display: block;
            width: 100% !important;
            height: 180px !important;
            cursor: crosshair;
            background: #fafafa;
            border-radius: 4px;
        }

        .botones-firma {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .btn-limpiar {
            background-color: #7f8c8d;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-limpiar:hover {
            background-color: #95a5a6;
        }

        button[type="submit"] {
            width: 100%;
            background: #e67e22;
            color: white;
            border: none;
            padding: 12px;
            margin-top: 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button[type="submit"]:hover {
            background: #d35400;
        }

        button:disabled {
            background: #bdc3c7 !important;
            cursor: not-allowed;
        }

        .preview-imagen {
            margin-top: 8px;
            max-width: 100%;
            max-height: 150px;
            border-radius: 4px;
            border: 1px solid #ddd;
            display: block;
        }

        .texto-carga {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 4px;
            display: block;
        }

        .foto-seccion {
            background: #f9f9f9;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-top: 15px;
        }
    </style>
</head>

<body>
    <div id="lockscreen-celya"
        style="position:fixed; top:0; left:0; width:100%; height:100%; background:#2c3e50; z-index:999999; display:flex; justify-content:center; align-items:center; font-family:Arial, sans-serif;">
        <div
            style="background:white; padding:30px; border-radius:8px; box-shadow:0 4px 15px rgba(0,0,0,0.3); text-align:center; max-width:360px; width:90%;">
            <h2 style="color:#2c3e50; margin-bottom:5px;">CelYa!</h2>
            <p style="color:#7f8c8d; font-size:14px; margin-top:0; margin-bottom:20px;">Acceso restringido al sistema
            </p>
            <input type="password" id="pass-input-celya" placeholder="Introduce la contraseña"
                style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ccc; border-radius:4px; box-sizing:border-box; font-size:16px; text-align:center;">
            <button id="btn-login-celya"
                style="width:100%; padding:12px; background:#9b59b6; color:white; border:none; border-radius:4px; font-weight:bold; font-size:16px; cursor:pointer; transition:background 0.3s;">Entrar
                al Sistema</button>
            <p id="error-login-celya"
                style="color:#c0392b; font-size:14px; margin-top:15px; display:none; font-weight:bold;"></p>
        </div>
    </div>

    <div class="container">
        <h2>📱 Registro de Contrato CelYa</h2>

        <div
            style="margin-bottom: 20px; padding: 10px; background: #f1f2f6; border-left: 5px solid #9b59b6; border-radius: 4px;">
            <label style="color: #2c3e50; font-weight: bold; margin: 0;">ID de Cliente Asignado para este
                Contrato:</label>
            <input type="text" id="idClienteVisual" value="Generando ID..." disabled
                style="background: transparent; border: none; font-size: 18px; font-weight: bold; color: #9b59b6; padding: 5px 0; width: 100%; box-shadow: none; margin-top: 0;">
        </div>

        <form id="contratoForm">
            <label>Seleccionar Celular de Inventario:</label>
            <select id="selectDispositivo" name="imei" required>
                <option value="">⏳ Cargando equipos disponibles...</option>
            </select>

            <label>Modelo Seleccionado:</label>
            <input type="text" id="modeloDisplay" name="modelo" readonly>

            <label>Monto de Enganche Pago ($):</label>
            <input type="text" id="engancheDisplay" readonly>

            <label>📆 Tipo de Periodo (Frecuencia de Pago):</label>
            <select id="tipoPeriodo" name="tipoPeriodo" required>
                <option value="semanal" selected>Semanal</option>
                <option value="quincenal">Quincenal</option>
            </select>

            <label>Plazo de Financiamiento:</label>
            <select id="plazoSemanas" name="plazoSemanas" required>
                <option value="26">Plan Rápido (26 Semanas)</option>
                <option value="52" selected>Plan Cómodo (52 Semanas)</option>
            </select>

            <label>Pago Semanal Calculado ($):</label>
            <input type="text" id="cuotaDisplay" name="cuota" readonly>

            <label>Monto Financiado Total ($):</label>
            <input type="text" id="totalFinanciadoDisplay" name="totalFinanciado" readonly>

            <label>🗓️ Anclaje al Día de Raya Laboral:</label>
            <select id="diaRaya" name="diaRaya" required>
                <option value="">-- Seleccione frecuencia y día de pago --</option>
                <optgroup label="Pago Semanal">
                    <option value="Semanal - Sábado">Semanal - Sábado</option>
                    <option value="Semanal - Viernes">Semanal - Viernes</option>
                    <option value="Semanal - Lunes">Semanal - Lunes</option>
                    <option value="Semanal - Martes">Semanal - Martes</option>
                    <option value="Semanal - Miércoles">Semanal - Miércoles</option>
                    <option value="Semanal - Jueves">Semanal - Jueves</option>
                    <option value="Semanal - Domingo">Semanal - Domingo</option>
                </optgroup>
                <optgroup label="Pago Quincenal">
                    <option value="Quincenal - Día 15 y 30">Quincenal - Día 15 y 30</option>
                    <option value="Quincenal - Día 10 y 25">Quincenal - Día 10 y 25</option>
                    <option value="Quincenal - Otro">Quincenal - Otro Día</option>
                </optgroup>
            </select>

            <input type="hidden" id="totalLetraHidden" name="totalLetra">

            <label>Nombre del Cliente:</label>
            <input type="text" id="cliente" name="cliente" required placeholder="Ej. Juan Pérez">

            <label>Teléfono Celular:</label>
            <input type="tel" name="telefono" required placeholder="10 dígitos">

            <label>Fecha de Nacimiento:</label>
            <input type="date" name="fechaNacimiento" required>

            <label>Dirección Completa:</label>
            <textarea id="direccion" name="direccion" rows="2" required
                placeholder="Calle, Número, Colonia, Municipio"></textarea>

            <label>Teléfono de Aval / Referencia:</label>
            <input type="tel" name="telefonoAval" required placeholder="10 dígitos">

            <div class="foto-seccion">
                <label>📸 Fotografía de INE (Frente):</label>
                <input type="file" id="ineDelanteraInput" accept="image/*" capture="camera"
                    onchange="procesarFoto(this, 'previewDelantera', 'delantera')">
                <span class="texto-carga">Sube o captura la parte delantera de la identificación</span>
                <div id="previewDelantera" class="preview-imagen"></div>
            </div>

            <div class="foto-seccion">
                <label>📸 Fotografía de INE (Reverso):</label>
                <input type="file" id="ineTraseraInput" accept="image/*" capture="camera"
                    onchange="procesarFoto(this, 'previewTrasera', 'trasera')">
                <span class="texto-carga">Sube o captura la parte trasera de la identificación</span>
                <div id="previewTrasera" class="preview-imagen"></div>
            </div>

            <div class="foto-seccion">
                <label>📸 Foto de Evidencia Física (Celular Encendido):</label>
                <input type="file" id="fotoEvidencia" accept="image/*" capture="camera" required>
                <span class="texto-carga">Sube o captura una foto del equipo encendido</span>
                <div id="previewEvidencia" class="preview-imagen"></div>
            </div>

            <div
                style="background: #f8f9fa; border: 1px solid #e2e8f0; padding: 15px; border-radius: 6px; margin: 20px 0;">
                <h3
                    style="font-size: 15px; margin-top: 0; color: #2c3e50; border-bottom: 1px solid #cbd5e1; padding-bottom: 5px; margin-bottom:10px;">
                    📋 Checklist de Entrega Obligatorio</h3>

                <label
                    style="display: flex; align-items: flex-start; font-weight: normal; margin-top: 10px; cursor: pointer; width: 100%;">
                    <input type="checkbox" id="chkDatos" required
                        style="width: auto; margin-right: 10px; margin-top: 3px;">
                    <span><strong>Datos y Entrega</strong> — Confirmo que mis datos personales y domicilio son
                        correctos, y que recibí el equipo en buen estado.</span>
                </label>

                <label
                    style="display: flex; align-items: flex-start; font-weight: normal; margin-top: 12px; cursor: pointer; width: 100%;">
                    <input type="checkbox" id="chkCondiciones" required
                        style="width: auto; margin-right: 10px; margin-top: 3px;">
                    <span><strong>Condiciones del Crédito</strong> — Entendí mi cuota semanal, fecha de pago y el
                        interés moratorio aplicable por atraso.</span>
                </label>

                <label
                    style="display: flex; align-items: flex-start; font-weight: normal; margin-top: 12px; cursor: pointer; width: 100%;">
                    <input type="checkbox" id="chkBloqueo" required
                        style="width: auto; margin-right: 10px; margin-top: 3px;">
                    <span><strong>Política de Bloqueo</strong> — Acepto que el equipo puede ser bloqueado remotamente en
                        caso de incumplimiento de pago.</span>
                </label>
            </div>

            <label>✍️ Firma Digital del Cliente:</label>
            <div class="contenedor-canvas-firma">
                <canvas id="canvasFirma"></canvas>
            </div>
            <div class="botones-firma">
                <button type="button" class="btn-limpiar" onclick="limpiarFirma()">🧹 Borrar Firma y Reintentar</button>
            </div>

            <input type="hidden" id="interesGlobal" name="interes">
            <input type="hidden" id="horastolGlobal" name="horastol">
            <input type="hidden" id="semanastolGlobal" name="semanastol">

            <button type="submit" id="btnEnviar">Generar Contrato y Archivar</button>
        </form>
    </div>

    <script>
        let cacheInventario = [];
        let ineDelanteraB64 = "";
        let ineTraseraB64 = "";
        let fotoEvidenciaB64 = "";

        document.getElementById('fotoEvidencia').addEventListener('change', async function (e) {
            if (e.target.files.length > 0) {
                document.getElementById('previewEvidencia').innerHTML = "⏳ Comprimiendo evidencia...";
                fotoEvidenciaB64 = await comprimirImagenAltaCalidad(e.target.files[0]);
                document.getElementById('previewEvidencia').innerHTML = `<img src="${fotoEvidenciaB64}" class="preview-imagen">`;
            }
        });

        // 🗜️ FUNCIÓN COMPRESORA DE IMÁGENES ALTA CALIDAD (Manteniendo resolución original)
        function comprimirImagenAltaCalidad(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function (event) {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = function () {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, img.width, img.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.90)); // 90% Calidad Nítida, sin alterar resolución
                    };
                };
                reader.onerror = error => reject(error);
            });
        }

        const canvas = document.getElementById('canvasFirma');
        const ctx = canvas.getContext('2d');
        let dibujando = false;

        // 🚀 LÓGICA DE ALTA DEFINICIÓN (HD): Escala los píxeles internos según la densidad de la pantalla del celular
        function redimensionarCanvas() {
            const rect = canvas.getBoundingClientRect();
            if (rect.width > 0) {
                const ratio = window.devicePixelRatio || 1;
                canvas.width = rect.width * ratio;
                canvas.height = 180 * ratio; // Mantiene la proporción interna fija
                ctx.scale(ratio, ratio);     // Normaliza las coordenadas del pincel

                // Re-establecemos los estilos de trazo tras alterar las dimensiones nativas del canvas
                ctx.lineWidth = 3;
                ctx.lineCap = "round";
                ctx.strokeStyle = "#2c3e50";
            }
        }

        // Traduce las posiciones relativas para que el pincel pinte justo debajo del dedo/mouse sin desfases en HD
        function obtenerPosicionMouse(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function arrancarDibujo(e) {
            if (canvas.width === 0 || canvas.height === 0) redimensionarCanvas();
            dibujando = true;
            const pos = obtenerPosicionMouse(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            if (e.cancelable) e.preventDefault();
        }

        function dibujar(e) {
            if (!dibujando) return;
            const pos = obtenerPosicionMouse(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            if (e.cancelable) e.preventDefault();
        }

        function pararDibujo() { dibujando = false; }

        canvas.addEventListener('mousedown', arrancarDibujo);
        canvas.addEventListener('mousemove', dibujar);
        canvas.addEventListener('mouseup', pararDibujo);
        canvas.addEventListener('mouseleave', pararDibujo);

        canvas.addEventListener('touchstart', arrancarDibujo, { passive: false });
        canvas.addEventListener('touchmove', dibujar, { passive: false });
        canvas.addEventListener('touchend', pararDibujo);

        function limpiarFirma() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function procesarFoto(input, previewId, tipo) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (evt) {
                let img = new Image();
                img.onload = function () {
                    let canvasMin = document.createElement('canvas');
                    let ctxMin = canvasMin.getContext('2d');
                    canvasMin.width = img.width; canvasMin.height = img.height;
                    ctxMin.drawImage(img, 0, 0, img.width, img.height);
                    let compressData = canvasMin.toDataURL('image/jpeg', 0.90); // 90% Calidad, sin alterar resolución
                    document.getElementById(previewId).innerHTML = `<img src="${compressData}" class="preview-imagen">`;
                    if (tipo === 'delantera') ineDelanteraB64 = compressData;
                    if (tipo === 'trasera') ineTraseraB64 = compressData;
                };
                img.src = evt.target.result;
            };
            reader.readAsDataURL(file);
        }

        window.onload = async function () {
            redimensionarCanvas();
            window.addEventListener('resize', redimensionarCanvas);

            try {
                // Solicitar ID Siguiente
                try {
                    const resId = await fetch(`${CONFIG.GOOGLE_SCRIPT_URL}?action=obtenerSiguienteId`);
                    const dataId = await resId.json();
                    if (dataId && dataId.siguienteId) {
                        document.getElementById('idClienteVisual').value = dataId.siguienteId;
                    }
                } catch (errId) {
                    document.getElementById('idClienteVisual').value = "C-Y000";
                }

                const urlAutenticada = `${CONFIG.GOOGLE_SCRIPT_URL}?token=${encodeURIComponent(CONFIG.API_TOKEN)}`;
                const res = await fetch(urlAutenticada);
                const data = await res.json();

                if (data.error) {
                    alert("Error de Seguridad en Servidor: " + data.error);
                    return;
                }

                document.getElementById('interesGlobal').value = data.config.interes;
                document.getElementById('horastolGlobal').value = data.config.horastol;
                document.getElementById('semanastolGlobal').value = data.config.semanastol;

                cacheInventario = data.inventario;
                const select = document.getElementById('selectDispositivo');
                select.innerHTML = '<option value="">-- Seleccione un IMEI --</option>';

                cacheInventario.forEach(eq => {
                    let opt = document.createElement('option');
                    opt.value = eq.imei;
                    opt.innerText = `${eq.modelo} (${eq.imei})`;
                    select.appendChild(opt);
                });

                // --- LECTOR DE DATOS DE TEXTO VIP ---
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('vip') === 'true') {
                    // 1. Cambiamos visualmente el título para saber qué es una renovación
                    const titulo = document.querySelector('h2');
                    if (titulo) titulo.innerHTML = "🌟 Registro de Contrato VIP";

                    // 2. Desactivamos la obligatoriedad de las fotos de la INE (ya que las tienes archivadas)
                    const ineDel = document.getElementById('ineDelanteraInput');
                    const ineTras = document.getElementById('ineTraseraInput');
                    if (ineDel) ineDel.required = false;
                    if (ineTras) ineTras.required = false;

                    // Colocamos un mensaje estético avisando que no se ocupan fotos de INE
                    document.getElementById('previewDelantera').innerHTML = `<span style="color:#27ae60; font-size:12px; font-weight:bold;">✅ Cliente VIP: INE ya archivada previamente</span>`;
                    document.getElementById('previewTrasera').innerHTML = `<span style="color:#27ae60; font-size:12px; font-weight:bold;">✅ Cliente VIP: INE ya archivada previamente</span>`;

                    // 3. Le pedimos a la base de datos que nos traiga los textos usando el imei de referencia
                    const imeiRef = urlParams.get('imei_ref');
                    if (imeiRef) {
                        fetch(`${CONFIG.GOOGLE_SCRIPT_URL}?action=buscarDatosVip&imeiAnterior=${imeiRef}`)
                            .then(res => res.json())
                            .then(data => {
                                if (data && data.success) {
                                    document.getElementById('cliente').value = data.cliente.toUpperCase();
                                    const telInput = document.querySelector('[name="telefono"]');
                                    if (telInput) telInput.value = data.telefono || "";
                                    document.getElementById('direccion').value = (data.direccion || "").toUpperCase();
                                    const avalInput = document.querySelector('[name="telefonoAval"]');
                                    if (avalInput) avalInput.value = data.telefonoAval || "";
                                    const fechaInput = document.querySelector('[name="fechaNacimiento"]');
                                    if (fechaInput && data.fechaNacimiento) {
                                        fechaInput.value = data.fechaNacimiento.split("T")[0];
                                    }
                                }
                            }).catch(e => console.log("Error al precargar textos VIP"));
                    }
                }

            } catch (err) {
                document.getElementById('selectDispositivo').innerHTML = '<option value="">❌ Error al conectar con inventario</option>';
            }
        };

        document.getElementById('selectDispositivo').addEventListener('change', actualizarFormularioPrecios);
        document.getElementById('plazoSemanas').addEventListener('change', actualizarFormularioPrecios);
        document.getElementById('tipoPeriodo').addEventListener('change', actualizarFormularioPrecios);

        function actualizarFormularioPrecios() {
            const imeiSelected = document.getElementById('selectDispositivo').value;
            const plazo = document.getElementById('plazoSemanas').value;
            const equipo = cacheInventario.find(e => e.imei === imeiSelected);

            if (!equipo) {
                document.getElementById('modeloDisplay').value = "";
                document.getElementById('engancheDisplay').value = "";
                document.getElementById('cuotaDisplay').value = "";
                document.getElementById('totalFinanciadoDisplay').value = "";
                document.getElementById('totalLetraHidden').value = "";
                return;
            }

            document.getElementById('modeloDisplay').value = equipo.modelo;
            document.getElementById('engancheDisplay').value = equipo.enganche;
            document.getElementById('totalFinanciadoDisplay').value = equipo.totalFinanciado;
            document.getElementById('totalLetraHidden').value = equipo.totalLetra;

            const tipoPeriodoVal = document.getElementById('tipoPeriodo').value;
            if (tipoPeriodoVal === "quincenal") {
                const totalFin = parseFloat(equipo.totalFinanciado.toString().replace(/[\$,]/g, "").trim()) || 0;
                const plazoNum = parseInt(plazo) || 1;
                const cuotaQ = Math.round(totalFin / plazoNum);
                document.getElementById('cuotaDisplay').value = "$" + cuotaQ.toLocaleString('es-MX');
            } else {
                if (plazo === "26") {
                    document.getElementById('cuotaDisplay').value = equipo.planRapido;
                } else {
                    document.getElementById('cuotaDisplay').value = equipo.planComodo;
                }
            }

            // --- VERIFICACIÓN DE IMEI EN TIEMPO REAL ---
            const selectDisp = document.getElementById('selectDispositivo');
            const btnSubmit = document.getElementById('btnEnviar');

            if (imeiSelected !== "") {
                // Alerta visual de carga
                selectDisp.style.background = "#fff3cd";

                fetch(`${CONFIG.GOOGLE_SCRIPT_URL}?action=verificarImei&imei=${imeiSelected}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data && data.existe) {
                            const comprador = data.cliente ? data.cliente.toString().toUpperCase() : "DESCONOCIDO";
                            alert(`🚨 ¡ATENCIÓN! Este celular (IMEI) ya fue vendido a: ${comprador}.\nElige otro equipo.`);
                            selectDisp.style.background = "#f8d7da"; // Color rojo de error
                            selectDisp.style.color = "#721c24";
                            btnSubmit.disabled = true; // Congela el botón
                            btnSubmit.innerText = `❌ IMEI de ${comprador} - Bloqueado`;
                            btnSubmit.style.background = "#c0392b";
                        } else {
                            selectDisp.style.background = "#fff"; // Color original
                            selectDisp.style.color = "#333";
                            btnSubmit.disabled = false;
                            btnSubmit.innerText = "Generar Contrato y Archivar";
                            btnSubmit.style.background = "#e67e22";
                        }
                    }).catch(err => {
                        console.log("Error verificando IMEI", err);
                        selectDisp.style.background = "#fff";
                    });
            } else {
                selectDisp.style.background = "#fff";
                selectDisp.style.color = "#333";
                btnSubmit.disabled = false;
                btnSubmit.innerText = "Generar Contrato y Archivar";
                btnSubmit.style.background = "#e67e22";
            }
        }

        document.getElementById('contratoForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            const colorOriginal = btn.style.background;

            btn.innerText = "⏳ Subiendo expediente y firmas...";
            btn.style.background = "#34495e";
            btn.disabled = true;

            try {
                const formularioElemento = document.getElementById('contratoForm');
                const sheetData = new URLSearchParams(new FormData(formularioElemento));

                // --- CAPTURA Y CÁLCULO DE VALORES DE PAGO ---
                const plazoUnidades = parseInt(document.getElementById('plazoSemanas').value) || 0;
                const tipoPeriodoSeleccionado = document.getElementById('tipoPeriodo').value;

                const totalFinVal = document.getElementById('totalFinanciadoDisplay').value;
                const totalFinanciado = parseFloat(totalFinVal.replace(/[\$,]/g, "").trim()) || 0;

                // El cálculo de la cuota se hace igual usando el total financiado dividido entre el plazo elegido
                const cuotaCalculada = totalFinanciado / plazoUnidades;

                sheetData.set('cuota', cuotaCalculada);
                sheetData.set('plazoSemanas', plazoUnidades);
                sheetData.append('plazo', plazoUnidades);
                sheetData.set('tipoPeriodo', tipoPeriodoSeleccionado);
                sheetData.set('diaRaya', document.getElementById('diaRaya').value);

                const clienteMayusculas = document.getElementById('cliente').value.trim().toUpperCase();
                const direccionMayusculas = document.getElementById('direccion').value.trim().toUpperCase();

                sheetData.set('cliente', clienteMayusculas);
                sheetData.set('direccion', direccionMayusculas);

                sheetData.append('token', CONFIG.API_TOKEN);
                sheetData.append('firmaBase64', canvas.toDataURL());
                sheetData.append('ineDelanteraBase64', ineDelanteraB64);
                sheetData.append('ineTraseraBase64', ineTraseraB64);
                sheetData.append('fotoEvidenciaBase64', fotoEvidenciaB64);

                const res = await fetch(CONFIG.GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: sheetData.toString(),
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                });
                const data = await res.json();

                if (data.result === 'success') {
                    btn.innerText = "✅ ¡Contrato Guardado con Éxito!";
                    btn.style.background = "#27ae60";

                    formularioElemento.reset();
                    limpiarFirma();
                    document.getElementById('previewDelantera').innerHTML = '';
                    document.getElementById('previewTrasera').innerHTML = '';
                    document.getElementById('previewEvidencia').innerHTML = '';
                    ineDelanteraB64 = ""; ineTraseraB64 = ""; fotoEvidenciaB64 = "";

                    setTimeout(() => {
                        btn.innerText = "Generar Contrato y Archivar";
                        btn.style.background = colorOriginal;
                        btn.disabled = false;
                        location.reload();
                    }, 4000);
                } else {
                    btn.innerText = "⚠️ " + data.error;
                    btn.style.background = "#c0392b";
                    btn.disabled = false;
                    setTimeout(() => {
                        btn.innerText = "Generar Contrato y Archivar";
                        btn.style.background = colorOriginal;
                    }, 4500);
                }
            } catch (err) {
                btn.innerText = "❌ Error de conexión, reintente.";
                btn.style.background = "#c0392b";
                btn.disabled = false;
                setTimeout(() => {
                    btn.innerText = "Generar Contrato y Archivar";
                    btn.style.background = colorOriginal;
                }, 3500);
            }
        });
    </script>
    <script>
        (function () {
            // Verificar si ya cuenta con sesión activa en esta pestaña
            if (sessionStorage.getItem('celya_authenticated') === 'true') {
                document.getElementById('lockscreen-celya').style.display = 'none';
                return;
            }

            // Eventos del botón y teclado
            document.getElementById('btn-login-celya').addEventListener('click', ejecutarLoginCelya);
            document.getElementById('pass-input-celya').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') ejecutarLoginCelya();
            });

            async function ejecutarLoginCelya() {
                const btn = document.getElementById('btn-login-celya');
                const errorTxt = document.getElementById('error-login-celya');
                const passValue = document.getElementById('pass-input-celya').value;

                if (!passValue) {
                    errorTxt.innerText = "⚠️ Escribe la contraseña";
                    errorTxt.style.display = 'block';
                    return;
                }

                btn.disabled = true;
                btn.innerText = "Verificando...";
                errorTxt.style.display = 'none';

                try {
                    const formData = new URLSearchParams();
                    formData.append('action', 'login');
                    formData.append('password', passValue);

                    // CONFIG.GOOGLE_SCRIPT_URL se jala de tu archivo config.js ya enlazado
                    const response = await fetch(CONFIG.GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        body: formData.toString(),
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                    });

                    const data = await response.json();

                    if (data.result === 'success') {
                        // Guardar token temporal de sesión
                        sessionStorage.setItem('celya_authenticated', 'true');
                        // Desvanecer pantalla de bloqueo
                        document.getElementById('lockscreen-celya').style.display = 'none';
                    } else {
                        errorTxt.innerText = "❌ Contraseña incorrecta";
                        errorTxt.style.display = 'block';
                        btn.disabled = false;
                        btn.innerText = "Entrar al Sistema";
                    }
                } catch (err) {
                    errorTxt.innerText = "🌐 Error de red, revisa tu conexión";
                    errorTxt.style.display = 'block';
                    btn.disabled = false;
                    btn.innerText = "Entrar al Sistema";
                }
            }
        })();
    </script>
