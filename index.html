<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Contrato - CelYa</title>
    <script src="config.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 500px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); margin: 0 auto; }
        h2 { text-align: center; color: #2c3e50; }
        label { font-weight: bold; display: block; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        input[readonly] { background-color: #e9ecef; }
        
        .contenedor-canvas-firma {
            width: 100%;
            margin-top: 5px;
            position: relative;
            background: #fff;
            border: 1px dashed #7f8c8d;
            border-radius: 4px;
        }
        canvas { display: block; width: 100%; height: 150px; cursor: crosshair; }
        .botones-firma { display: flex; gap: 10px; margin-top: 5px; }
        .btn-limpiar { background-color: #7f8c8d; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        
        .preview-img { max-width: 100%; max-height: 150px; margin-top: 10px; border-radius: 4px; display: block; border: 1px solid #ddd; }
        .btn-submit { width: 100%; background-color: #e67e22; color: white; padding: 12px; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; margin-top: 20px; cursor: pointer; transition: background 0.3s; }
        .btn-submit:hover { background-color: #d35400; }
        .btn-submit:disabled { background-color: #7f8c8d; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h2>📱 Registro de Contrato - CelYa</h2>
    
    <form id="contratoForm">
        <input type="hidden" id="interes" name="interes">
        <input type="hidden" id="horastol" name="horastol">
        <input type="hidden" id="semanastol" name="semanastol">

        <label>Nombre del Cliente:</label>
        <input type="text" id="cliente" name="cliente" placeholder="Nombre Completo" required>

        <label>Teléfono:</label>
        <input type="tel" id="telefono" name="telefono" placeholder="10 dígitos" required>

        <label>Fecha de Nacimiento:</label>
        <input type="date" id="fechaNacimiento" name="fechaNacimiento" required>

        <label>Domicilio:</label>
        <input type="text" id="direccion" name="direccion" placeholder="Dirección completa" required>

        <label>Teléfono del Aval:</label>
        <input type="tel" id="telefonoAval" name="telefonoAval" placeholder="10 dígitos" required>

        <label>Seleccionar IMEI del Equipo:</label>
        <select id="imei" name="imei" required>
            <option value="">Cargando equipos disponibles...</option>
        </select>

        <label>Modelo del Celular:</label>
        <input type="text" id="modelo" name="modelo" readonly required>

        <label>Enganche Requerido ($):</label>
        <input type="text" id="monto" name="monto" readonly required>

        <label>Plazo del Plan Semanal:</label>
        <select id="plazoSemanas" name="plazoSemanas" required>
            <option value="">-- Elige el plazo --</option>
            <option value="26">Plan Rápido (6 Meses / 26 Semanas)</option>
            <option value="52">Plan Cómodo (12 Meses / 52 Semanas)</option>
        </select>

        <label>Cuota Semanal ($):</label>
        <input type="text" id="cuota" name="cuota" readonly required>

        <label>Monto Financiado Total ($):</label>
        <input type="text" id="totalFinanciado" name="totalFinanciado" placeholder="Ej: $5,200" required>

        <label>Total en Letra:</label>
        <input type="text" id="totalLetra" name="totalLetra" placeholder="Ej: Cinco mil doscientos pesos" required>

        <label>INE Delantera (Foto/Archivo):</label>
        <input type="file" id="fileDelantera" accept="image/*" required>
        <div id="previewDelantera"></div>

        <label>INE Trasera (Foto/Archivo):</label>
        <input type="file" id="fileTrasera" accept="image/*" required>
        <div id="previewTrasera"></div>

        <label>Firma Digital del Cliente:</label>
        <div class="contenedor-canvas-firma">
            <canvas id="canvasFirma"></canvas>
        </div>
        <div class="botones-firma">
            <button type="button" class="btn-limpiar" id="clearFirma">Borrar Firma</button>
        </div>

        <button type="submit" class="btn-submit" id="btnEnviar">Generar Contrato y Archivar</button>
    </form>
</div>

<script>
    let inventarioDisponibles = [];
    let ineDelanteraB64 = "";
    let ineTraseraB64 = "";

    // Configuración del canvas de la firma
    const canvas = document.getElementById('canvasFirma');
    const ctx = canvas.getContext('2d');
    let dibujando = false;

    function ajustarCanvas() {
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#2c3e50';
    }

    // Inicializar listeners del canvas (Soporta Mouse y Pantalla Táctil)
    function obtenerPosicion(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function arrancarDibujo(e) {
        dibujando = true;
        const pos = obtenerPosicion(e);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        if(e.cancelable) e.preventDefault();
    }

    function moverDibujo(e) {
        if (!dibujando) return;
        const pos = obtenerPosicion(e);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        if(e.cancelable) e.preventDefault();
    }

    function pararDibujo() { dibujando = false; }

    canvas.addEventListener('mousedown', arrancarDibujo);
    canvas.addEventListener('mousemove', moverDibujo);
    window.addEventListener('mouseup', pararDibujo);

    canvas.addEventListener('touchstart', arrancarDibujo, {passive: false});
    canvas.addEventListener('touchmove', moverDibujo, {passive: false});
    window.addEventListener('touchend', pararDibujo);

    document.getElementById('clearFirma').addEventListener('click', () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    });

    window.addEventListener('resize', ajustarCanvas);
    setTimeout(ajustarCanvas, 500);

    // 🚀 CARGAR INVENTARIO DESDE GOOGLE APPS SCRIPT
    async function cargarInventarioGlobal() {
        try {
            const res = await fetch(CONFIG.GOOGLE_SCRIPT_URL);
            const data = await res.json();
            
            // Inyectar datos de configuración global ocultos
            document.getElementById('interes').value = data.config.interes;
            document.getElementById('horastol').value = data.config.horastol;
            document.getElementById('semanastol').value = data.config.semanastol;

            inventarioDisponibles = data.inventario || [];
            const selectImei = document.getElementById('imei');
            selectImei.innerHTML = '<option value="">-- Selecciona un IMEI --</option>';

            inventarioDisponibles.forEach(cel => {
                let opt = document.createElement('option');
                opt.value = cel.imei;
                opt.textContent = `${cel.modelo} - IMEI: ${cel.imei}`;
                selectImei.appendChild(opt);
            });
        } catch (err) {
            console.error("Fallo al traer inventario:", err);
            document.getElementById('imei').innerHTML = '<option value="">❌ Error al conectar con inventario</option>';
        }
    }

    // Escuchar cambios en la selección del IMEI
    document.getElementById('imei').addEventListener('change', function() {
        const cel = inventarioDisponibles.find(item => item.imei === this.value);
        if (cel) {
            document.getElementById('modelo').value = cel.modelo;
            document.getElementById('monto').value = cel.enganche;
            actualizarCuotaDinamica(); // Validar si el plazo ya estaba seleccionado
        } else {
            document.getElementById('modelo').value = "";
            document.getElementById('monto').value = "";
            document.getElementById('cuota').value = "";
        }
    });

    // Escuchar cambios en el plazo para calcular la cuota en caliente 🚀
    document.getElementById('plazoSemanas').addEventListener('change', actualizarCuotaDinamica);

    function actualizarCuotaDinamica() {
        const imeiSeleccionado = document.getElementById('imei').value;
        const plazo = document.getElementById('plazoSemanas').value;
        const campoCuota = document.getElementById('cuota');

        if (!imeiSeleccionado || !plazo) {
            campoCuota.value = "";
            return;
        }

        const cel = inventarioDisponibles.find(item => item.imei === imeiSeleccionado);
        if (cel) {
            let valorCuota = (plazo === "26") ? cel.cuota : cel.totalLetra;

            // Asegurar formato de moneda correcto
            if (valorCuota.toString().includes("$")) {
                campoCuota.value = valorCuota;
            } else {
                campoCuota.value = "$" + parseFloat(valorCuota).toLocaleString('es-MX', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
            }
        }
    }

    // Convertir imágenes cargadas a Base64 de forma local
    function procesarArchivoImagen(inputElement, callback, previewId) {
        inputElement.addEventListener('change', function(e) {
            const archivo = e.target.files[0];
            if (!archivo) return;
            const lector = new FileReader();
            lector.onload = function(evt) {
                callback(evt.target.result);
                document.getElementById(previewId).innerHTML = `<img src="${evt.target.result}" class="preview-img">`;
            };
            lector.readAsDataURL(archivo);
        });
    }

    procesarArchivoImagen(document.getElementById('fileDelantera'), (b64) => { ineDelanteraB64 = b64; }, 'previewDelantera');
    procesarArchivoImagen(document.getElementById('fileTrasera'), (b64) => { ineTraseraB64 = b64; }, 'previewTrasera');

    // 📬 PROCESAR EL ENVÍO DEL CONTRATO COMPLETO
    document.getElementById('contratoForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        const colorOriginal = btn.style.background;

        // Validar si el canvas contiene trazos antes de proceder
        const firmaVacia = ctx.getImageData(0, 0, canvas.width, canvas.height).data.every(p => p === 0);
        if (firmaVacia) return alert("Por favor, el cliente debe firmar el contrato antes de archivar.");

        btn.innerText = "⏳ Subiendo datos y fotos a CelYa Sheets...";
        btn.style.background = "#34495e";
        btn.disabled = true;

        try {
            const firmaB64 = canvas.toDataURL('image/png');
            const sheetData = new URLSearchParams();

            // Llenado de variables POST obligatorias
            sheetData.append('cliente', document.getElementById('cliente').value);
            sheetData.append('telefono', document.getElementById('telefono').value);
            sheetData.append('fechaNacimiento', document.getElementById('fechaNacimiento').value);
            sheetData.append('direccion', document.getElementById('direccion').value);
            sheetData.append('telefonoAval', document.getElementById('telefonoAval').value);
            sheetData.append('imei', document.getElementById('imei').value);
            sheetData.append('modelo', document.getElementById('modelo').value);
            sheetData.append('monto', document.getElementById('monto').value);
            sheetData.append('plazoSemanas', document.getElementById('plazoSemanas').value);
            sheetData.append('cuota', document.getElementById('cuota').value);
            sheetData.append('totalFinanciado', document.getElementById('totalFinanciado').value);
            sheetData.append('totalLetra', document.getElementById('totalLetra').value);
            sheetData.append('interes', document.getElementById('interes').value);
            sheetData.append('horastol', document.getElementById('horastol').value);
            sheetData.append('semanastol', document.getElementById('semanastol').value);
            
            // Adjuntar Base64 empaquetado para Google Drive / Telegram
            sheetData.append('firmaBase64', firmaB64);
            sheetData.append('ineDelanteraBase64', ineDelanteraB64);
            sheetData.append('ineTraseraBase64', ineTraseraB64);

            const respuesta = await fetch(CONFIG.GOOGLE_SCRIPT_URL, {
                method: 'POST',
                body: sheetData.toString(),
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            });
            const resultado = await respuesta.json();

            if (resultado.result === 'success') {
                btn.innerText = "✅ ¡Contrato Guardado con Éxito!";
                btn.style.background = "#27ae60";
                document.getElementById('contratoForm').reset();
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                document.getElementById('previewDelantera').innerHTML = '';
                document.getElementById('previewTrasera').innerHTML = '';
                
                setTimeout(() => { location.reload(); }, 3500);
            } else {
                btn.innerText = "⚠️ Error: " + resultado.error;
                btn.style.background = "#c0392b";
                btn.disabled = false;
            }
        } catch (error) {
            btn.innerText = "❌ Error de red, reintente.";
            btn.style.background = "#c0392b";
            btn.disabled = false;
        }
    });

    // Arrancar la carga del inventario al abrir el archivo
    cargarInventarioGlobal();
</script>

</body>
</html>
