<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Contrato - CelYa</title>
    <script src="config.js?v=2"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
        }

        .container {
            max-width: 500px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin: 0 auto;
        }

        h2 {
            text-align: center;
            color: #2c3e50;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        input[readonly] {
            background-color: #e9ecef;
        }

        .contenedor-canvas-firma {
            width: 100%;
            margin-top: 5px;
            position: relative;
            background: #fff;
            border: 2px dashed #95a5a6;
            border-radius: 6px;
            box-sizing: border-box;
        }

        /* El canvas ocupa el 100% del contenedor por CSS, pero su tamaño nativo se escala por JavaScript */
        canvas {
            display: block;
            width: 100% !important;
            height: 180px !important;
            cursor: crosshair;
            background: #fafafa;
            border-radius: 4px;
        }

        .botones-firma {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .btn-limpiar {
            background-color: #7f8c8d;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-limpiar:hover {
            background-color: #95a5a6;
        }

        button[type="submit"] {
            width: 100%;
            background: #e67e22;
            color: white;
            border: none;
            padding: 12px;
            margin-top: 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button[type="submit"]:hover {
            background: #d35400;
        }

        button:disabled {
            background: #bdc3c7 !important;
            cursor: not-allowed;
        }

        .preview-imagen {
            margin-top: 8px;
            max-width: 100%;
            max-height: 150px;
            border-radius: 4px;
            border: 1px solid #ddd;
            display: block;
        }

        .texto-carga {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 4px;
            display: block;
        }

        .foto-seccion {
            background: #f9f9f9;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-top: 15px;
        }
    </style>
</head>

<body>
    <div id="lockscreen-celya"
        style="position:fixed; top:0; left:0; width:100%; height:100%; background:#2c3e50; z-index:999999; display:flex; justify-content:center; align-items:center; font-family:Arial, sans-serif;">
        <div
            style="background:white; padding:30px; border-radius:8px; box-shadow:0 4px 15px rgba(0,0,0,0.3); text-align:center; max-width:360px; width:90%;">
            <div style="text-align: center; margin-bottom: 15px;">
                <img src="https://lh3.googleusercontent.com/d/13bnQONkSe9Sd1zsC0Iw8LoPmx1ljvOtQ" alt="CelYa Logo"
                    style="max-height: 80px; width: auto;">
            </div>
            <h2 style="color:#2c3e50; margin-bottom:5px; display: none;">CelYa!</h2>
            <p style="color:#7f8c8d; font-size:14px; margin-top:0; margin-bottom:20px;">Acceso restringido al sistema
            </p>
            <input type="password" id="pass-input-celya" placeholder="Introduce la contraseña"
                style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ccc; border-radius:4px; box-sizing:border-box; font-size:16px; text-align:center;">
            <button id="btn-login-celya"
                style="width:100%; padding:12px; background:#9b59b6; color:white; border:none; border-radius:4px; font-weight:bold; font-size:16px; cursor:pointer; transition:background 0.3s;">Entrar
                al Sistema</button>
            <p id="error-login-celya"
                style="color:#c0392b; font-size:14px; margin-top:15px; display:none; font-weight:bold;"></p>
        </div>
    </div>

    <div class="container">
        <div style="text-align: center; margin-bottom: 15px;">
            <img src="https://lh3.googleusercontent.com/d/13bnQONkSe9Sd1zsC0Iw8LoPmx1ljvOtQ" alt="CelYa Logo"
                style="max-height: 80px; width: auto; cursor: pointer;" onclick="window.location.reload();">
        </div>
        <h2>📱 Registro de Contrato CelYa</h2>

        <div
            style="margin-bottom: 20px; padding: 10px; background: #f1f2f6; border-left: 5px solid #9b59b6; border-radius: 4px;">
            <label style="color: #2c3e50; font-weight: bold; margin: 0;">ID de Cliente Asignado para este
                Contrato:</label>
            <input type="text" id="idClienteVisual" value="Generando ID..." disabled
                style="background: transparent; border: none; font-size: 18px; font-weight: bold; color: #9b59b6; padding: 5px 0; width: 100%; box-shadow: none; margin-top: 0;">
        </div>

        <form id="contratoForm">
            <label>Seleccionar Celular de Inventario:</label>
            <select id="selectDispositivo" name="imei" required>
                <option value="">⏳ Cargando equipos disponibles...</option>
            </select>

            <label>Modelo Seleccionado:</label>
            <input type="text" id="modeloDisplay" name="modelo" readonly>

            <label for="agendaCobro">📆 Frecuencia y Día de Pago Obligatorio:</label>
            <select id="agendaCobro" required>
                <option value="">-- Selecciona cómo y cuándo pagará --</option>
                <option value="SEMANAL|LUNES">Semanal — Cada Lunes</option>
                <option value="SEMANAL|MARTES">Semanal — Cada Martes</option>
                <option value="SEMANAL|MIERCOLES">Semanal — Cada Miércoles</option>
                <option value="SEMANAL|JUEVES">Semanal — Cada Jueves</option>
                <option value="SEMANAL|VIERNES">Semanal — Cada Viernes</option>
                <option value="SEMANAL|SABADO">Semanal — Cada Sábado</option>
                <option value="SEMANAL|DOMINGO">Semanal — Cada Domingo</option>
                <option value="QUINCENAL|15 Y 30">Quincenal — Días 15 y 30 (Fijo)</option>
                <option value="QUINCENAL|SABADO">Quincenal — Sábado de Raya (Cada 2 semanas)</option>
                <option value="CONTADO|UNICO">De Contado — Pago Único</option>
            </select>

            <h3>Estructura del Crédito</h3>

            <label for="precioContado">💰 Precio de Contado:</label>
            <input type="text" id="precioContado" readonly
                style="background-color: #e9ecef; font-weight: bold; color: #1a5276;">

            <label for="monto">🏁 Pago Inicial / Enganche Recibido ($):</label>
            <input type="number" id="monto" name="monto" style="color: #c0392b; font-weight: bold;" placeholder="Ej. 1200" min="0">

            <label for="plazoSemanas">Plazo de Financiamiento:</label>
            <select id="plazoSemanas" required>
                <option id="optPlazoCorto" value="26" selected>Plan Rápido (26 Semanas / 26 Pagos)</option>
                <option id="optPlazoLargo" value="52">Plan Cómodo (52 Semanas / 52 Pagos)</option>
            </select>

            <label for="cuota">Monto del Abono Regular ($):</label>
            <input type="text" id="cuota" name="cuota" readonly
                style="background-color: #e9ecef; font-weight: bold; color: #2e7d32;">

            <label for="totalFinanciado">Total Financiado (Monto + Interés):</label>
            <input type="text" id="totalFinanciado" name="totalFinanciado" readonly style="background-color: #e9ecef;">

            <input type="hidden" id="totalLetraHidden" name="totalLetra">

            <label>Nombre del Cliente:</label>
            <input type="text" id="cliente" name="cliente" required placeholder="Ej. Juan Pérez">

            <label>Teléfono Celular:</label>
            <input type="tel" name="telefono" required placeholder="10 dígitos">

            <label>Fecha de Nacimiento:</label>
            <input type="date" name="fechaNacimiento" required>

            <label>Dirección Completa:</label>
            <textarea id="direccion" name="direccion" rows="2" required
                placeholder="Calle, Número, Colonia, Municipio"></textarea>

            <label>Teléfono de Aval / Referencia:</label>
            <input type="tel" name="telefonoAval" required placeholder="10 dígitos">

            <div class="foto-seccion">
                <label>📸 Fotografía de INE (Frente):</label>
                <input type="file" id="ineDelanteraInput" accept="image/*" capture="camera"
                    onchange="procesarFoto(this, 'previewDelantera', 'delantera')">
                <span class="texto-carga">Sube o captura la parte delantera de la identificación</span>
                <div id="previewDelantera" class="preview-imagen"></div>
            </div>

            <div class="foto-seccion">
                <label>📸 Fotografía de INE (Reverso):</label>
                <input type="file" id="ineTraseraInput" accept="image/*" capture="camera"
                    onchange="procesarFoto(this, 'previewTrasera', 'trasera')">
                <span class="texto-carga">Sube o captura la parte trasera de la identificación</span>
                <div id="previewTrasera" class="preview-imagen"></div>
            </div>

            <div class="foto-seccion">
                <label>📸 Foto de Evidencia Física (Celular Encendido):</label>
                <input type="file" id="fotoEvidencia" accept="image/*" capture="camera" required>
                <span class="texto-carga">Sube o captura una foto del equipo encendido</span>
                <div id="previewEvidencia" class="preview-imagen"></div>
            </div>

            <div
                style="background: #f8f9fa; border: 1px solid #e2e8f0; padding: 15px; border-radius: 6px; margin: 20px 0;">
                <h3
                    style="font-size: 15px; margin-top: 0; color: #2c3e50; border-bottom: 1px solid #cbd5e1; padding-bottom: 5px; margin-bottom:10px;">
                    📋 Checklist de Entrega Obligatorio</h3>

                <label
                    style="display: flex; align-items: flex-start; font-weight: normal; margin-top: 10px; cursor: pointer; width: 100%;">
                    <input type="checkbox" id="chkDatos" required
                        style="width: auto; margin-right: 10px; margin-top: 3px;">
                    <span><strong>Datos y Entrega</strong> — Confirmo que mis datos personales y domicilio son
                        correctos, y que recibí el equipo en buen estado.</span>
                </label>

                <label
                    style="display: flex; align-items: flex-start; font-weight: normal; margin-top: 12px; cursor: pointer; width: 100%;">
                    <input type="checkbox" id="chkCondiciones" required
                        style="width: auto; margin-right: 10px; margin-top: 3px;">
                    <span><strong>Condiciones del Crédito</strong> — Entendí mi cuota semanal, fecha de pago y el
                        interés moratorio aplicable por atraso.</span>
                </label>

                <label
                    style="display: flex; align-items: flex-start; font-weight: normal; margin-top: 12px; cursor: pointer; width: 100%;">
                    <input type="checkbox" id="chkBloqueo" required
                        style="width: auto; margin-right: 10px; margin-top: 3px;">
                    <span><strong>Política de Bloqueo</strong> — Acepto que el equipo puede ser bloqueado remotamente en
                        caso de incumplimiento de pago.</span>
                </label>
            </div>

            <label>✍️ Firma Digital del Cliente:</label>
            <div class="contenedor-canvas-firma">
                <canvas id="canvasFirma"></canvas>
            </div>
            <div class="botones-firma">
                <button type="button" class="btn-limpiar" onclick="limpiarFirma()">🧹 Borrar Firma y Reintentar</button>
            </div>

            <input type="hidden" id="interesGlobal" name="interes">
            <input type="hidden" id="horastolGlobal" name="horastol">
            <input type="hidden" id="semanastolGlobal" name="semanastol">

            <button type="submit" id="btnEnviar">Generar Contrato y Archivar</button>
        </form>
    </div>

    <script>
        let cacheInventario = [];
        let totalFinanciadoActual = 0;
        let ineDelanteraB64 = "";
        let ineTraseraB64 = "";
        let fotoEvidenciaB64 = "";

        let CONFIG_TASAS_SHEETS = {}; // Aquí caen en vivo el 66% y 90% del Sheets

        // Conexión directa al backend para traer los intereses de D2 y E2
        async function sincronizarTasasDesdeSheets() {
            try {
                const response = await fetch(`${CONFIG.GOOGLE_SCRIPT_URL}?action=obtenerTasasConfig`);
                const data = await response.json();
                if (data.result === 'success') {
                    CONFIG_TASAS_SHEETS = data;
                    console.log("🎯 Tasas CelYa! Sincronizadas:", CONFIG_TASAS_SHEETS);
                }
            } catch (err) {
                console.error("⚠️ Error de red al sincronizar tasas, usando respaldo local:", err);
                // Respaldo de seguridad por si falla la conexión un segundo
                CONFIG_TASAS_SHEETS = { interes26: 0.66, interes52: 0.90, enganche26: 0.33, enganche52: 0.45, engancheSemanal: 0.165, engancheQuincenal: 0.33, engancheComodo: 0.11 };
            }
        }

        // Disparador automático al cargar la interfaz
        window.addEventListener('DOMContentLoaded', sincronizarTasasDesdeSheets);

        document.getElementById('fotoEvidencia').addEventListener('change', async function (e) {
            if (e.target.files.length > 0) {
                document.getElementById('previewEvidencia').innerHTML = "⏳ Comprimiendo evidencia...";
                fotoEvidenciaB64 = await comprimirImagenAltaCalidad(e.target.files[0]);
                document.getElementById('previewEvidencia').innerHTML = `<img src="${fotoEvidenciaB64}" class="preview-imagen">`;
            }
        });

        // 🗜️ FUNCIÓN COMPRESORA DE IMÁGENES ALTA CALIDAD (Manteniendo resolución original)
        function comprimirImagenAltaCalidad(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function (event) {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = function () {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, img.width, img.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.90)); // 90% Calidad Nítida, sin alterar resolución
                    };
                };
                reader.onerror = error => reject(error);
            });
        }

        const canvas = document.getElementById('canvasFirma');
        const ctx = canvas.getContext('2d');
        let dibujando = false;

        // 🚀 LÓGICA DE ALTA DEFINICIÓN (HD): Escala los píxeles internos según la densidad de la pantalla del celular
        function redimensionarCanvas() {
            const rect = canvas.getBoundingClientRect();
            if (rect.width > 0) {
                const ratio = window.devicePixelRatio || 1;
                canvas.width = rect.width * ratio;
                canvas.height = 180 * ratio; // Mantiene la proporción interna fija
                ctx.scale(ratio, ratio);     // Normaliza las coordenadas del pincel

                // Re-establecemos los estilos de trazo tras alterar las dimensiones nativas del canvas
                ctx.lineWidth = 3;
                ctx.lineCap = "round";
                ctx.strokeStyle = "#2c3e50";
            }
        }

        // Traduce las posiciones relativas para que el pincel pinte justo debajo del dedo/mouse sin desfases en HD
        function obtenerPosicionMouse(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function arrancarDibujo(e) {
            if (canvas.width === 0 || canvas.height === 0) redimensionarCanvas();
            dibujando = true;
            const pos = obtenerPosicionMouse(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            if (e.cancelable) e.preventDefault();
        }

        function dibujar(e) {
            if (!dibujando) return;
            const pos = obtenerPosicionMouse(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            if (e.cancelable) e.preventDefault();
        }

        function pararDibujo() { dibujando = false; }

        canvas.addEventListener('mousedown', arrancarDibujo);
        canvas.addEventListener('mousemove', dibujar);
        canvas.addEventListener('mouseup', pararDibujo);
        canvas.addEventListener('mouseleave', pararDibujo);

        canvas.addEventListener('touchstart', arrancarDibujo, { passive: false });
        canvas.addEventListener('touchmove', dibujar, { passive: false });
        canvas.addEventListener('touchend', pararDibujo);

        function limpiarFirma() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function procesarFoto(input, previewId, tipo) {
            const file = input.files[0];
            if (!file) return;
            document.getElementById(previewId).innerHTML = `<span style="color:#e67e22; font-size:12px; font-weight:bold;">⏳ Procesando y optimizando imagen...</span>`;
            const reader = new FileReader();
            reader.onload = function (evt) {
                let img = new Image();
                img.onload = function () {
                    let canvasMin = document.createElement('canvas');
                    let ctxMin = canvasMin.getContext('2d');
                    canvasMin.width = img.width; canvasMin.height = img.height;
                    ctxMin.drawImage(img, 0, 0, img.width, img.height);
                    let compressData = canvasMin.toDataURL('image/jpeg', 0.90); // 90% Calidad, sin alterar resolución
                    document.getElementById(previewId).innerHTML = `<img src="${compressData}" class="preview-imagen">`;
                    if (tipo === 'delantera') ineDelanteraB64 = compressData;
                    if (tipo === 'trasera') ineTraseraB64 = compressData;
                };
                img.src = evt.target.result;
            };
            reader.readAsDataURL(file);
        }

        window.onload = async function () {
            redimensionarCanvas();
            window.addEventListener('resize', redimensionarCanvas);

            try {
                // Solicitar ID Siguiente
                try {
                    const resId = await fetch(`${CONFIG.GOOGLE_SCRIPT_URL}?action=obtenerSiguienteId`);
                    const dataId = await resId.json();
                    if (dataId && dataId.siguienteId) {
                        document.getElementById('idClienteVisual').value = dataId.siguienteId;
                    }
                } catch (errId) {
                    document.getElementById('idClienteVisual').value = "C-Y000";
                }

                const urlAutenticada = `${CONFIG.GOOGLE_SCRIPT_URL}?token=${encodeURIComponent(CONFIG.API_TOKEN)}`;
                const res = await fetch(urlAutenticada);
                const data = await res.json();

                if (data.error) {
                    toast("Error de seguridad en servidor: " + data.error, 'error');
                    return;
                }

                document.getElementById('interesGlobal').value = data.config.interes;
                document.getElementById('horastolGlobal').value = data.config.horastol;
                document.getElementById('semanastolGlobal').value = data.config.semanastol;

                cacheInventario = data.inventario;
                const select = document.getElementById('selectDispositivo');
                select.innerHTML = '<option value="">-- Seleccione un IMEI --</option>';

                cacheInventario.forEach(eq => {
                    let opt = document.createElement('option');
                    opt.value = eq.imei;
                    opt.innerText = `${eq.modelo} (${eq.imei})`;
                    select.appendChild(opt);
                });

                // --- LECTOR DE DATOS DE TEXTO PRE-LLENADO DESDE EL CATÁLOGO ---
                const urlParams = new URLSearchParams(window.location.search);
                const preModelo = urlParams.get('pre_modelo');
                if (preModelo) {
                    const options = select.options;
                    for (let i = 0; i < options.length; i++) {
                        if (options[i].text.toLowerCase().includes(preModelo.toLowerCase())) {
                            select.selectedIndex = i;
                            break;
                        }
                    }
                }

                const preFrecuencia = urlParams.get('pre_frecuencia');
                if (preFrecuencia) {
                    const selectCobro = document.getElementById('agendaCobro');
                    if (preFrecuencia.toUpperCase() === "QUINCENAL") {
                        selectCobro.value = "QUINCENAL|15 Y 30";
                    } else if (preFrecuencia.toUpperCase() === "SEMANAL") {
                        selectCobro.value = "SEMANAL|SABADO";
                    } else if (preFrecuencia.toUpperCase() === "CONTADO") {
                        selectCobro.value = "CONTADO|UNICO";
                    }
                    if (typeof procesarAgendaCobro === 'function') {
                        procesarAgendaCobro();
                    }
                }

                const prePlazo = urlParams.get('pre_plazo');
                if (prePlazo) {
                    const selectPlazo = document.getElementById('plazoSemanas');
                    if (prePlazo === "26" || prePlazo === "13") {
                        selectPlazo.value = "26";
                    } else if (prePlazo === "52" || prePlazo === "26_largo") {
                        selectPlazo.value = "52";
                    }
                }

                const preNombre = urlParams.get('pre_nombre');
                if (preNombre) {
                    document.getElementById('cliente').value = preNombre.toUpperCase();
                }

                const preTelefono = urlParams.get('pre_telefono');
                if (preTelefono) {
                    const telInput = document.querySelector('[name="telefono"]');
                    if (telInput) telInput.value = preTelefono;
                }

                const preEnganche = urlParams.get('pre_enganche');
                if (preEnganche) {
                    document.getElementById('monto').value = parseFloat(preEnganche) || "";
                }

                const preClientId = urlParams.get('pre_client_id');
                if (preClientId && preClientId.startsWith("C-Y")) {
                    document.getElementById('idClienteVisual').value = preClientId;
                }

                // --- LECTOR DE COTIZACIÓN POR ID DESDE LA HOJA ---
                const preCotizacionId = urlParams.get('pre_cotizacion_id');
                if (preCotizacionId) {
                    try {
                        const urlCot = `${CONFIG.GOOGLE_SCRIPT_URL}?action=obtenerCotizacion&id=${encodeURIComponent(preCotizacionId)}&token=${encodeURIComponent(CONFIG.API_TOKEN)}`;
                        const resCot = await fetch(urlCot);
                        const dataCot = await resCot.json();
                        if (dataCot && dataCot.result === 'success' && dataCot.data) {
                            const c = dataCot.data;
                            if (c['id cliente'] && String(c['id cliente']).startsWith("C-Y")) {
                                document.getElementById('idClienteVisual').value = c['id cliente'];
                            }
                            if (c['cliente']) {
                                document.getElementById('cliente').value = String(c['cliente']).toUpperCase();
                            }
                            if (c['whatsapp / teléfono']) {
                                const telInput = document.querySelector('[name="telefono"]');
                                if (telInput) telInput.value = c['whatsapp / teléfono'];
                            }
                            if (c['plan elegido']) {
                                const selectPlazo = document.getElementById('plazoSemanas');
                                if (String(c['plan elegido']).toUpperCase().includes("CÓMODO")) {
                                    selectPlazo.value = "52";
                                } else if (String(c['plan elegido']).toUpperCase().includes("RÁPIDO")) {
                                    selectPlazo.value = "26";
                                }
                            }
                            if (c['frecuencia']) {
                                const selectCobro = document.getElementById('agendaCobro');
                                const freqUpper = String(c['frecuencia']).toUpperCase();
                                if (freqUpper === "QUINCENAL") {
                                    selectCobro.value = "QUINCENAL|15 Y 30";

        function actualizarEngancheYFinanciamientoPorPlazo(forceReset = false) {
            const imeiSelected = document.getElementById('selectDispositivo').value;
            const equipo = cacheInventario.find(e => e.imei === imeiSelected);
            if (!equipo) return;

            const planElegido = document.getElementById('plazoSemanas').value; // "26" o "52"
            const precioContado = parseFloat(equipo.precioContado.toString().replace(/[\$,]/g, "").trim()) || 0;

            if (precioContado > 0) {
                const selector = document.getElementById('agendaCobro').value;
                const partes = selector ? selector.split('|') : [];
                const frecuencia = partes[0] || "SEMANAL";

                if (frecuencia === "CONTADO") {
                    // Contado: Pago inicial = Precio de contado, Total Financiado = 0, Cuota = 0
                    document.getElementById('monto').value = precioContado;
                    totalFinanciadoActual = 0;
                    document.getElementById('totalFinanciado').value = "$0";
                    document.getElementById('cuota').value = "$0";
                } else {
                    const factorEngancheMinimo = (frecuencia === "QUINCENAL")
                        ? ((planElegido === "52")
                            ? ((CONFIG_TASAS_SHEETS.engancheComodo !== undefined ? CONFIG_TASAS_SHEETS.engancheComodo : 0.11) * 2)
                            : (CONFIG_TASAS_SHEETS.engancheQuincenal !== undefined ? CONFIG_TASAS_SHEETS.engancheQuincenal : 0.33))
                        : ((planElegido === "52")
                            ? (CONFIG_TASAS_SHEETS.engancheComodo !== undefined ? CONFIG_TASAS_SHEETS.engancheComodo : 0.11)
                            : (CONFIG_TASAS_SHEETS.engancheSemanal !== undefined ? CONFIG_TASAS_SHEETS.engancheSemanal : 0.165));
                    const engancheMinimoObligatorio = Math.ceil((precioContado * factorEngancheMinimo) / 10) * 10;

                    const inputMonto = document.getElementById('monto');
                    
                    if (forceReset) {
                        inputMonto.value = engancheMinimoObligatorio;
                    } else {
                        let engancheIngresado = parseFloat(inputMonto.value) || 0;
                        if (engancheIngresado < engancheMinimoObligatorio) {
                            if (document.activeElement !== inputMonto) {
                                inputMonto.value = engancheMinimoObligatorio;
                            }
                        }
                    }

                    let engancheIngresado = parseFloat(inputMonto.value) || 0;
                    let engancheEfectivo = engancheMinimoObligatorio;
                    if (engancheIngresado > engancheMinimoObligatorio) {
                        engancheEfectivo = engancheIngresado;
                    }

                    // --- CALCULAR CUOTA BASE Y CUOTA ACTIVA EXACTAMENTE COMO EN CATALOGO.HTML ---
                    const factorEngSemanal = (planElegido === "52")
                        ? (CONFIG_TASAS_SHEETS.engancheComodo !== undefined ? CONFIG_TASAS_SHEETS.engancheComodo : 0.11)
                        : (CONFIG_TASAS_SHEETS.engancheSemanal !== undefined ? CONFIG_TASAS_SHEETS.engancheSemanal : 0.165);
                    const engSemanalCalculado = Math.ceil((precioContado * factorEngSemanal) / 10) * 10;
                    
                    const factorInteres = (planElegido === "26") ? CONFIG_TASAS_SHEETS.interes26 : CONFIG_TASAS_SHEETS.interes52;
                    const totalFinanciadoSemanal = (precioContado * (1 + factorInteres)) - engSemanalCalculado;
                    const numPagosSemanales = (planElegido === "26") ? 26 : 52;
                    
                    const cuotaSemanalBase = Math.round(totalFinanciadoSemanal / numPagosSemanales);
                    
                    let cuotaBase = cuotaSemanalBase;
                    if (frecuencia === "QUINCENAL") {
                        cuotaBase = cuotaSemanalBase * 2;
                    }
                    
                    const numPagos = (frecuencia === "QUINCENAL") ? (numPagosSemanales / 2) : numPagosSemanales;

                    let cuotaActiva = cuotaBase;
                    if (engancheEfectivo > engancheMinimoObligatorio) {
                        const extraEnganche = engancheEfectivo - engancheMinimoObligatorio;
                        cuotaActiva = cuotaBase - (extraEnganche / numPagos);
                    }

                    const cuotaFinal = Math.round(cuotaActiva);
                    document.getElementById('cuota').value = "$" + cuotaFinal.toLocaleString('es-MX');

                    const totalFinanciadoCalculado = cuotaFinal * numPagos;
                    totalFinanciadoActual = totalFinanciadoCalculado;
                    document.getElementById('totalFinanciado').value = "$" + totalFinanciadoCalculado.toLocaleString('es-MX');
                }
            }
        }

            el.className = 'celya-toast';
            el.style.cssText += 'background:' + bg;
            el.style.setProperty('--dur', dur + 'ms');
            el.innerHTML = '<div class="celya-toast-body">'
                + '<span class="celya-toast-icon">' + icon + '</span>'
                + '<div><div class="celya-toast-title">' + title + '</div>'
                + '<div class="celya-toast-msg">' + msg + '</div></div></div>'
                + '<div class="celya-toast-bar"></div>';
            document.getElementById('toast-container').appendChild(el);
            const remove = () => { el.classList.add('hide'); setTimeout(() => el.remove(), 320); };
            const tid = setTimeout(remove, dur);
            el.addEventListener('click', () => { clearTimeout(tid); remove(); });
        }
    </script>
</body>

</html>
