<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CelYa! - Catálogo Oficial</title>
    <!-- Google Fonts Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="config.js"></script>
    <style>
        :root {
            --primary: #0f172a;
            --primary-light: #1e293b;
            --primary-hover: #1e293b;
            --accent: #e67e22;
            --accent-gradient: linear-gradient(135deg, #ff9f43, #e67e22);
            --success: #27ae60;
            --danger: #e74c3c;
            --bg-light: #f8fafc;
            --border-color: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body { 
            font-family: 'Outfit', sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #f1f5f9; 
            color: var(--text-main); 
            line-height: 1.5;
        }

        header { 
            background: linear-gradient(135deg, #1e293b, #0f172a); 
            color: white; 
            text-align: center; 
            padding: 40px 20px; 
            border-bottom: 4px solid var(--accent); 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        header img {
            max-height: 90px;
            margin-bottom: 10px;
            transition: transform 0.3s ease;
        }
        header img:hover {
            transform: scale(1.05);
        }
        header h1 { 
            margin: 0; 
            font-size: 32px; 
            font-weight: 700;
            letter-spacing: -0.5px; 
        }
        header p { 
            margin: 8px 0 0 0; 
            color: #94a3b8; 
            font-size: 16px; 
            font-weight: 300;
        }

        .container { 
            max-width: 1200px; 
            margin: 30px auto; 
            padding: 0 20px; 
            box-sizing: border-box; 
        }
        
        .buscador-box { 
            background: white; 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); 
            border: 1px solid var(--border-color); 
            margin-bottom: 30px; 
        }
        .buscador-box h3 {
            margin: 0 0 15px 0;
            font-weight: 600;
            color: var(--primary);
            font-size: 18px;
        }
        .search-wrapper { 
            display: flex; 
            gap: 12px; 
            max-width: 700px; 
            margin: 0 auto; 
        }
        .search-wrapper input { 
            flex: 1; 
            padding: 14px 20px; 
            border: 1.5px solid var(--border-color); 
            border-radius: 12px; 
            font-size: 16px; 
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .search-wrapper input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(230, 126, 34, 0.15);
        }
        .btn-buscar { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 0 30px; 
            font-weight: 600; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 16px; 
            font-family: inherit;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }
        .btn-buscar:hover {
            background: var(--primary-light);
        }
        .btn-buscar:active {
            transform: scale(0.98);
        }

        /* Toolbar para Ordenar y Filtrar */
        .controls-bar {
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .control-group label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
        }
        .control-group select {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1.5px solid var(--border-color);
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            outline: none;
            color: var(--text-main);
            background-color: white;
            cursor: pointer;
            transition: border-color 0.2s ease;
        }
        .control-group select:focus {
            border-color: var(--accent);
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 12px;
            margin-bottom: 25px;
        }
        .section-header h2 { 
            color: var(--primary); 
            font-size: 22px; 
            font-weight: 700;
            margin: 0;
        }
        .section-header .count-badge {
            background: #e2e8f0;
            color: var(--primary);
            font-size: 14px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* Grid del Catálogo */
        .grid-equipos { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
            margin-top: 15px; 
        }

        /* Tarjeta Celular Premium */
        .card-celular { 
            background: white; 
            border-radius: 16px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03); 
            padding: 24px; 
            border: 1px solid var(--border-color); 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .card-celular:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.08), 0 10px 10px -5px rgba(0,0,0,0.03);
        }

        /* Badges flotantes */
        .card-badges {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .brand-badge {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 6px;
            letter-spacing: 0.5px;
        }
        .brand-samsung { background-color: #ebf5ff; color: #1e40af; }
        .brand-apple { background-color: #f3f4f6; color: #1f2937; }
        .brand-xiaomi { background-color: #fff7ed; color: #c2410c; }
        .brand-motorola { background-color: #f0fdf4; color: #166534; }
        .brand-otro { background-color: #faf5ff; color: #6b21a8; }

        .status-badge {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 20px;
        }
        .status-available { background-color: #dcfce7; color: #15803d; }
        .status-order { background-color: #fef3c7; color: #b45309; }

        .card-celular .img-container {
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            position: relative;
        }
        .card-celular img { 
            max-height: 100%; 
            max-width: 100%;
            object-fit: contain; 
            transition: transform 0.3s ease;
        }
        .card-celular:hover img {
            transform: scale(1.05);
        }

        .card-celular h4 { 
            margin: 10px 0 5px 0; 
            color: var(--primary); 
            font-size: 17px; 
            font-weight: 600; 
            height: 48px; 
            overflow: hidden; 
            display: -webkit-box; 
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical; 
            line-height: 1.4;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin: 10px 0;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 10px;
        }
        .price-contado {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }
        .price-contado span {
            font-weight: 600;
            color: var(--text-main);
        }
        
        .card-celular .enganche { 
            font-size: 20px; 
            font-weight: 700; 
            color: var(--danger); 
            background: #fff5f5; 
            padding: 8px 12px; 
            border-radius: 10px; 
            text-align: center;
            margin: 5px 0 15px 0;
            border: 1px solid #ffe3e3;
        }
        .card-celular .enganche span {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            display: block;
            margin-bottom: 2px;
            text-transform: uppercase;
        }

        .card-celular .cuotas { 
            font-size: 13px; 
            color: var(--text-main); 
            margin-bottom: 20px; 
            background: var(--bg-light); 
            padding: 12px; 
            border-radius: 10px; 
            border: 1px solid var(--border-color);
        }
        .cuota-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        .cuota-item:last-child {
            margin-bottom: 0;
        }
        .cuota-item span.plan-label {
            color: var(--text-muted);
            font-weight: 500;
        }
        .cuota-item span.plan-val {
            font-weight: 700;
            color: var(--primary);
        }

        .btn-solicitar { 
            background: var(--accent-gradient); 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 10px; 
            font-weight: 600; 
            cursor: pointer; 
            width: 100%; 
            font-size: 15px; 
            font-family: inherit;
            transition: opacity 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(230, 126, 34, 0.2);
        }
        .btn-solicitar:hover {
            opacity: 0.95;
            box-shadow: 0 10px 15px -3px rgba(230, 126, 34, 0.3);
        }
        .btn-solicitar:active {
            transform: scale(0.98);
        }

        /* Modal */
        .modal-solicitud { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(4px);
            justify-content: center; 
            align-items: center; 
            z-index: 1000; 
            padding: 15px; 
            box-sizing: border-box;
        }
        .modal-content { 
            background: white; 
            padding: 30px; 
            border-radius: 16px; 
            max-width: 480px; 
            width: 100%; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            border: 1px solid var(--border-color);
        }
        .modal-content h3 {
            margin: 0 0 10px 0;
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
            border-bottom: 2px solid var(--accent);
            padding-bottom: 8px;
        }
        .modal-content label { 
            font-weight: 600; 
            font-size: 13px; 
            margin-top: 15px; 
            display: block; 
            color: var(--text-main);
        }
        .modal-content input, .modal-content select { 
            width: 100%; 
            padding: 12px; 
            margin-top: 6px; 
            border: 1.5px solid var(--border-color); 
            border-radius: 10px; 
            font-family: inherit;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
        }
        .modal-content input:focus, .modal-content select:focus {
            border-color: var(--accent);
        }
    </style>
</head>
<body>

    <header>
        <div style="text-align: center; margin-bottom: 10px;">
            <img src="https://lh3.googleusercontent.com/d/13bnQONkSe9Sd1zsC0Iw8LoPmx1ljvOtQ" alt="CelYa Logo">
        </div>
        <h1>CelYa! Créditos Celulares</h1>
        <p>Estrena el smartphone que buscas con pagos semanales a tu medida</p>
    </header>

    <div class="container">
        
        <div class="buscador-box">
            <h3>🔍 ¿Buscas un modelo específico?</h3>
            <div class="search-wrapper">
                <input type="text" id="inputBusqueda" placeholder="Ej: iPhone 12, Samsung A54, Xiaomi...">
                <button type="button" class="btn-buscar" id="btnBuscar" onclick="solicitarBusqueda()">Buscar</button>
            </div>
        </div>

        <!-- Barra de Controles (Ordenar y Filtrar) -->
        <div class="controls-bar">
            <div class="control-group">
                <label for="filterBrand">🏷️ Filtrar Marca:</label>
                <select id="filterBrand" onchange="aplicarFiltrosYOrden()">
                    <option value="ALL">Todas las marcas</option>
                </select>
            </div>
            <div class="control-group">
                <label for="sortBy">↕️ Ordenar por:</label>
                <select id="sortBy" onchange="aplicarFiltrosYOrden()">
                    <option value="DEFAULT">Destacados (Recomendado)</option>
                    <option value="ENGANCHE_ASC">Enganche Mínimo: Menor a Mayor</option>
                    <option value="PLAN_26_ASC">Pago Semanal (Plan Rápido): Menor a Mayor</option>
                    <option value="PLAN_52_ASC">Pago Semanal (Plan Cómodo): Menor a Mayor</option>
                    <option value="MODEL_ASC">Marca / Modelo (A-Z)</option>
                </select>
            </div>
        </div>

        <div class="section-header">
            <h2 id="tituloSeccion">✨ Modelos Destacados y Favoritos CelYa!</h2>
            <span class="count-badge" id="countBadge">0 equipos</span>
        </div>
        
        <div id="contenedorResultados" class="grid-equipos">
            <p style="grid-column: 1/-1; text-align:center; color:var(--text-muted); font-style:italic;">Cargando catálogo oficial...</p>
        </div>
    </div>

    <!-- Modal de Registro -->
    <div id="modalCredito" class="modal-solicitud">
        <div class="modal-content">
            <h3>📋 Solicitar Crédito CelYa!</h3>
            <p style="font-size: 15px; color: var(--primary); font-weight: 600; margin: 15px 0 5px 0; background: var(--bg-light); padding: 10px; border-radius: 8px; border-left: 4px solid var(--accent);" id="modalEquipoTexto">Equipo: --</p>
            
            <form id="formInteresado">
                <input type="hidden" id="hiddenId">
                <input type="hidden" id="hiddenModelo">
                <input type="hidden" id="hiddenEsFijo">

                <label>Tu Nombre Completo:</label>
                <input type="text" id="cliNombre" required placeholder="Ej. Juan Pérez">

                <label>Tu WhatsApp de Contacto:</label>
                <input type="tel" id="cliTelefono" required placeholder="Ej. 667 123 4567">

                <label>Plazo de Pago de tu Preferencia:</label>
                <select id="cliPlazo">
                    <option value="26 Semanas">Plan Rápido (26 Pagos Semanales)</option>
                    <option value="52 Semanas">Plan Cómodo (52 Pagos Semanales)</option>
                </select>

                <div style="display: flex; gap: 12px; margin-top: 25px;">
                    <button type="button" onclick="enviarSolicitudFinal()" style="background:var(--success); color:white; border:none; padding:12px; flex:2; font-weight:bold; border-radius:10px; cursor:pointer; font-size:15px;">📲 Solicitar Crédito</button>
                    <button type="button" onclick="cerrarModal()" style="background:var(--text-muted); color:white; border:none; padding:12px; flex:1; font-weight:bold; border-radius:10px; cursor:pointer; font-size:15px;">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Almacén local de equipos cargados
        window.equiposCargados = [];

        // 🚀 Carga inicial
        async function cargarPantallaInicial() {
            renderizarCatalogo("");
        }

        function solicitarBusqueda() {
            const query = document.getElementById('inputBusqueda').value.trim();
            if(!query) {
                document.getElementById('tituloSeccion').innerText = "✨ Modelos Destacados y Favoritos CelYa!";
                renderizarCatalogo("");
                return;
            }
            document.getElementById('tituloSeccion').innerText = `🔍 Opciones Encontradas para: "${query}"`;
            renderizarCatalogo(query);
        }

        // Extrae la marca del título del modelo de forma inteligente
        function obtenerMarca(modelo) {
            const m = modelo.trim().toUpperCase();
            if (m.startsWith("SAMSUNG")) return "Samsung";
            if (m.startsWith("APPLE") || m.startsWith("IPHONE")) return "Apple";
            if (m.startsWith("XIAOMI") || m.startsWith("REDMI") || m.startsWith("POCO")) return "Xiaomi";
            if (m.startsWith("MOTO") || m.startsWith("MOTOROLA")) return "Motorola";
            if (m.startsWith("OPPO")) return "Oppo";
            if (m.startsWith("INFINIX")) return "Infinix";
            if (m.startsWith("HONOR")) return "Honor";
            
            const primeraPalabra = modelo.trim().split(" ")[0];
            return primeraPalabra.charAt(0).toUpperCase() + primeraPalabra.slice(1).toLowerCase();
        }

        // Genera la clase CSS correcta para la insignia de marca
        function obtenerClaseMarca(marca) {
            const m = marca.toLowerCase();
            if (m === "samsung") return "brand-samsung";
            if (m === "apple") return "brand-apple";
            if (m === "xiaomi") return "brand-xiaomi";
            if (m === "motorola") return "brand-motorola";
            return "brand-otro";
        }

        // Carga los datos por red
        async function renderizarCatalogo(busqueda) {
            const contenedor = document.getElementById('contenedorResultados');
            const btn = document.getElementById('btnBuscar');
            
            btn.innerText = "⏳";
            btn.disabled = true;

            try {
                const res = await fetch(`${CONFIG.GOOGLE_SCRIPT_URL}?action=buscarModelosCatalogo&q=${encodeURIComponent(busqueda)}`);
                const data = await res.json();
                
                if (data.result === 'success' && data.resultados) {
                    window.equiposCargados = data.resultados;
                    
                    // Rellenar dinámicamente el listado de marcas del dropdown
                    rellenarDropdownMarcas(data.resultados);
                    
                    // Aplicar filtros y orden predeterminados
                    aplicarFiltrosYOrden();
                } else {
                    window.equiposCargados = [];
                    contenedor.innerHTML = "<p style='grid-column:1/-1; text-align:center; color:var(--accent); padding:30px; font-weight:500;'>No hay equipos disponibles con esos criterios de búsqueda.</p>";
                    document.getElementById('countBadge').innerText = "0 equipos";
                }
            } catch (err) {
                console.error(err);
                contenedor.innerHTML = "<p style='grid-column:1/-1; text-align:center; color:var(--danger); padding:30px; font-weight:600;'>Error de comunicación con la base de datos.</p>";
            } finally {
                btn.innerText = "Buscar";
                btn.disabled = false;
            }
        }

        // Llena el dropdown de marcas según las que existan en stock actual
        function rellenarDropdownMarcas(equipos) {
            const selectBrand = document.getElementById('filterBrand');
            const valorPrevio = selectBrand.value; // Conservar selección si ya existía
            
            const marcasUnicas = new Set();
            equipos.forEach(item => {
                const marca = obtenerMarca(item.modelo);
                marcasUnicas.add(marca);
            });

            // Limpiar excepto el default
            selectBrand.innerHTML = '<option value="ALL">Todas las marcas</option>';
            
            // Ordenar alfabéticamente
            const marcasOrdenadas = Array.from(marcasUnicas).sort();
            marcasOrdenadas.forEach(marca => {
                selectBrand.innerHTML += `<option value="${marca}">${marca}</option>`;
            });

            // Intentar restaurar valor
            if (Array.from(selectBrand.options).some(opt => opt.value === valorPrevio)) {
                selectBrand.value = valorPrevio;
            } else {
                selectBrand.value = "ALL";
            }
        }

        // Aplica el orden y filtrado localmente
        function aplicarFiltrosYOrden() {
            const brandSelected = document.getElementById('filterBrand').value;
            const sortSelected = document.getElementById('sortBy').value;
            const contenedor = document.getElementById('contenedorResultados');

            // 1. Filtrar
            let filtrados = [...window.equiposCargados];
            if (brandSelected !== "ALL") {
                filtrados = filtrados.filter(item => obtenerMarca(item.modelo) === brandSelected);
            }

            // 2. Ordenar
            if (sortSelected === "ENGANCHE_ASC") {
                filtrados.sort((a, b) => (a.engancheMinimo || 0) - (b.engancheMinimo || 0));
            } else if (sortSelected === "PLAN_26_ASC") {
                filtrados.sort((a, b) => (a.cuota26 || 0) - (b.cuota26 || 0));
            } else if (sortSelected === "PLAN_52_ASC") {
                filtrados.sort((a, b) => (a.cuota52 || 0) - (b.cuota52 || 0));
            } else if (sortSelected === "MODEL_ASC") {
                filtrados.sort((a, b) => a.modelo.localeCompare(b.modelo));
            }

            // Actualizar badge contador
            document.getElementById('countBadge').innerText = `${filtrados.length} ${filtrados.length === 1 ? 'equipo' : 'equipos'}`;

            // 3. Pintar en pantalla
            contenedor.innerHTML = "";

            if (filtrados.length > 0) {
                filtrados.forEach(item => {
                    const marca = obtenerMarca(item.modelo);
                    const claseMarca = obtenerClaseMarca(marca);
                    
                    // Etiqueta de entrega inmediata o pedido
                    const badgeEstado = item.entregaInmediata
                        ? `<span class="status-badge status-available">⚡ Disponible</span>`
                        : `<span class="status-badge status-order">⏳ Bajo Pedido</span>`;

                    // Mostrar precio de contado si existe
                    const rowContado = item.precioContado && item.precioContado > 0
                        ? `<div class="price-row">
                            <span class="price-contado">Precio Contado:</span>
                            <span class="price-contado"><span>$${Math.round(item.precioContado).toLocaleString('es-MX')}</span></span>
                           </div>`
                        : '';

                    contenedor.innerHTML += `
                        <div class="card-celular">
                            <div>
                                <div class="card-badges">
                                    <span class="brand-badge ${claseMarca}">${marca}</span>
                                    ${badgeEstado}
                                </div>
                                <div class="img-container">
                                    <img src="${item.foto}" alt="${item.modelo}" onerror="this.src='https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=150&auto=format&fit=crop'">
                                </div>
                                <h4>${item.modelo}</h4>
                                ${rowContado}
                                <div class="enganche">
                                    <span>Pago Inicial</span>
                                    Enganche: $${Math.round(item.engancheMinimo).toLocaleString('es-MX')}
                                </div>
                            </div>
                            <div>
                                <div class="cuotas">
                                    <div class="cuota-item">
                                        <span class="plan-label">⏱️ Plan Rápido (26 sem):</span>
                                        <span class="plan-val">$${Math.round(item.cuota26).toLocaleString('es-MX')}/sem</span>
                                    </div>
                                    <div class="cuota-item" style="margin-top: 8px;">
                                        <span class="plan-label">🗓️ Plan Cómodo (52 sem):</span>
                                        <span class="plan-val">$${Math.round(item.cuota52).toLocaleString('es-MX')}/sem</span>
                                    </div>
                                </div>
                                <button class="btn-solicitar" onclick="abrirModalCredito('${item.id}', '${item.modelo.replace(/'/g, "")}', ${item.esFijo})">Pedir a Crédito</button>
                            </div>
                        </div>
                    `;
                });
            } else {
                contenedor.innerHTML = "<p style='grid-column: 1/-1; text-align:center; color:var(--text-muted); padding:30px; font-style:italic;'>No hay celulares que coincidan con la marca seleccionada.</p>";
            }
        }

        function abrirModalCredito(id, modelo, esFijo) {
            document.getElementById('hiddenId').value = id;
            document.getElementById('hiddenModelo').value = modelo;
            document.getElementById('hiddenEsFijo').value = esFijo;
            document.getElementById('modalEquipoTexto').innerText = `Equipo: ${modelo}`;
            document.getElementById('modalCredito').style.display = 'flex';
        }

        function cerrarModal() {
            document.getElementById('modalCredito').style.display = 'none';
            document.getElementById('formInteresado').reset();
        }

        async function enviarSolicitudFinal() {
            const nombre = document.getElementById('cliNombre').value.trim();
            const telefono = document.getElementById('cliTelefono').value.trim();
            const id = document.getElementById('hiddenId').value;
            const modelo = document.getElementById('hiddenModelo').value;
            const esFijo = document.getElementById('hiddenEsFijo').value;
            const plazo = document.getElementById('cliPlazo').value;

            if(!nombre || !telefono) {
                alert("Por favor rellena tus datos de contacto.");
                return;
            }

            try {
                const params = new URLSearchParams();
                params.append('action', 'registrarCotizacionPublica');
                params.append('nombre', nombre);
                params.append('telefono', telefono);
                
                const referenciaProducto = (esFijo === "true") ? `Stock Fijo: ${modelo}` : `https://articulo.mercadolibre.com.mx/MLM-${id.replace("MLM","")}`;
                params.append('link', referenciaProducto);
                params.append('plazo', `${plazo} (${modelo})`);

                const res = await fetch(CONFIG.GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: params.toString(),
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                });
                const data = await res.json();

                if (data.result === 'success') {
                    alert(`✅ ¡Excelente, ${nombre}!\n\nHemos recibido tu solicitud para el ${modelo}.\n\nUn asesor validará tu crédito y te escribirá por WhatsApp en unos minutos.`);
                    cerrarModal();
                } else {
                    alert("Ocurrió un detalle al guardar la solicitud.");
                }
            } catch (e) {
                alert("Error de red, intenta más tarde.");
            }
        }

        // Ejecutar al abrir
        window.onload = cargarPantallaInicial;
    </script>
</body>
</html>
